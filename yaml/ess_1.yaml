  /CreateBatchQuickSignUrl:
    post:
      description: '该接口用于发起合同后，生成个人/企业用户的批量待办链接。

        **注意：**

        1. 该接口可生成签署人的批量、合同组签署/查看链接 。

        2. 该签署链接**有效期为30分钟**，过期后将失效，如需签署可重新创建批量签署链接 。

        3. 该接口返回的签署链接适用于APP集成的场景，支持APP打开或浏览器直接打开，**不支持微信小程序嵌入**。

        跳转到小程序的实现，参考微信官方文档(分为<a href="https://developers.weixin.qq.com/miniprogram/dev/api/navigate/wx.navigateToMiniProgram.html">全屏</a>、<a
        href="https://developers.weixin.qq.com/miniprogram/dev/framework/open-ability/openEmbeddedMiniProgram.html">半屏</a>两种方式)，如何配置也可以请参考:
        <a href="https://qian.tencent.com/developers/company/openwxminiprogram">跳转电子签小程序配置</a>。

        4. 因h5涉及人脸身份认证能力基于慧眼人脸核身，对Android和iOS系统均有一定要求， 因此<font color=''red''>App嵌入H5签署合同需要按照慧眼提供的<a
        href="https://cloud.tencent.com/document/product/1007/61076">慧眼人脸核身兼容性文档</a>做兼容性适配</font>。

        5. H5签署现在仅支持中国大陆身份证和中国港澳台居民居住证。'
