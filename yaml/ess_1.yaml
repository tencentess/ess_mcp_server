  /CreateBatchCancelFlowUrl:
    post:
      description: "指定需要批量撤回的签署流程Id，以获取批量撤销链接。\n客户需指定要撤回的签署流程Id，最多可指定100个，超过100则不处理。\n\
        接口调用成功后，将返回批量撤回合同的链接。通过点击链接，可跳转至电子签小程序完成批量撤回操作。\n\n- **可撤回合同状态**：未全部签署完成\n\
        - **不撤回合同状态**：已全部签署完成、已拒签、已过期、已撤回、拒绝填写、已解除等合同状态。\n\n批量撤销结果可以通过接口返回的TaskId关联[批量撤销任务结果回调](https://qian.tencent.com/developers/company/callback_types_contracts_sign#%E4%B9%9D-%E6%89%B9%E9%87%8F%E6%92%A4%E9%94%80%E7%BB%93%E6%9E%9C%E5%9B%9E%E8%B0%83)或通过接口[查询批量撤销签署流程任务结果](https://qian.tencent.com/developers/companyApis/operateFlows/CreateBatchCancelFlowUrl)\n\
        \n\n注：\n1. 如果合同流程中的参与方均已签署完毕，则无法通过该接口撤销合同，签署完毕的合同需要双方走解除流程将合同作废，可以参考<a href=\"\
        https://qian.tencent.com/developers/companyApis/operateFlows/CreateReleaseFlow\"\
        \ target=\"_blank\">发起解除合同流程</a>接口。\n\n2. 有对应合同撤销权限的人:  \n![image](https://qcloudimg.tencent-cloud.cn/raw/5967e502c56c267b693c90a5da110b6c.png)\n\
        \n\n- 发起人所在企业的**超管、法人**\n- 合同的**发起人**<font color='red'>（并已经授予撤销我发起的合同权限）</font>\n\
        - 其它员工<font color='red'>（并已经授予撤销我发起的合同后）</font>：\n    - 撤销人与发起人<font color='red'>**不在**</font>同一个部门：<font\
        \ color='red'>（确保已授予查询合同 - 企业全部合同权限）</font>\n    - 撤销人与发起人<font color='red'>**在**</font>用一个部门：<font\
        \ color='red'>（确保授予查询合同 - 本部门全部合同权限 或 企业全部合同权限）</font>\n\n\n3. <font color='red'>**只有撤销没有参与方签署过或只有自动签署签署过的合同，才会返还合同额度。**</font>\n\
        \n4. 撤销后可以看合同PDF内容的人员： 发起方的超管， 发起方自己，发起方撤销合同的操作人员，已经签署合同、已经填写合同、邀请填写已经补充信息的参与人员，\
        \ 其他参与人员看不到合同的内容。"
      operationId: CreateBatchCancelFlowUrl
      parameters:
      - in: body
        schema:
          $ref: '#/body_definitions/CreateBatchCancelFlowUrlRequest'
      produces:
      - application/json
      responses:
        '200':
