      - description: 撤销单个签署流程
        input: "POST / HTTP/1.1\nHost: ess.tencentcloudapi.com\nContent-Type: application/json\n\
          X-TC-Action: CancelFlow\n<公共请求参数>\n\n{\n    \"Operator\":{\n        \"UserId\"\
          :\"yDRCLUUgygq2xun5UuO4zjEwg0vjoimj\"\n    },\n    \"FlowId\":\"yDwFmUUckpstqfvzUE1h3jo1f3cqjkGm\"\
