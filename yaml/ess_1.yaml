  /ModifyIntegrationRole:
    post:
      description: '此接口（ModifyIntegrationRole）用来更新企业自定义的SaaS角色或集团角色。


        适用场景1：更新当前企业的自定义SaaS角色或集团角色，并且更新时不进行角色中权限的更新（PermissionGroups 参数不传）。


        适用场景2：更新当前企业的自定义SaaS角色或集团角色，并且更新时进行角色中权限的设置（PermissionGroups 参数要传），权限树内容 PermissionGroups
        可参考接口 DescribeIntegrationRoles 的输出。此处注意权限树内容可能会更新，需尽量拉取最新的权限树内容，并且权限树内容 PermissionGroups
        必须是一颗完整的权限树。


        适用场景3：更新集团角色管理的子企业列表，可通过设置 SubOrganizationIds 参数达到此效果。


        适用场景4：主企业代理子企业操作的场景，需要设置Agent参数，并且ProxyOrganizationId设置为子企业的id即可。


        注意事项：SaaS角色和集团角色对应的权限树是不一样的。'
      operationId: ModifyIntegrationRole
      parameters:
      - in: body
        schema:
          $ref: '#/body_definitions/ModifyIntegrationRoleRequest'
      produces:
      - application/json
      responses:
        '200':
          schema:
            $ref: '#/body_definitions/ModifyIntegrationRoleResponse'
      x-tcapi-action-label: []
      x-tcapi-action-name: 更新企业角色
      x-tcapi-cam-condition: ''
      x-tcapi-cam-resource: '*'
      x-tcapi-category: 角色管理相关接口
      x-tcapi-cli-visibility: 1
