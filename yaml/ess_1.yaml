      x-tcapi-examples:
      - description: '1. 获取合同的签署链接(FlowId设置成合同的ID)

          2. 签署链接是短链(EndPoint设置成HTTP_SHORT_URL)

          3. 根据证件信息匹配签署人(指定IdCardType, IdCardNumber参数)'
