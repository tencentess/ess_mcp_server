  /CreateBatchSignUrl:
    post:
      description: '通过此接口，可以创建小程序批量签署链接，个人/企业员工可通过此链接跳转至小程序进行批量签署。请确保生成链接时的身份信息与签署合同参与方的信息保持一致。


        注意事项：

        - 使用此接口生成链接，需要贵企业先开通 <font color="red">个人签署方仅校验手机号 </font>功能。您可以在 <b>【腾讯电子签网页端控制台】->【更多】->【高级签署能力】</b>中找到该功能。

        - 生成批量签署链接时，<font color="red">合同目标参与方的状态必须为<b>待签署</b>状态</font>。签署人点击链接后需要输入短信验证码才能查看合同内容。

        - 企业员工批量签署链接：需要传入签署方所在企业名称，用户名字和手机号（或者身份证件信息）参数来生成签署链接。

        - 个人批量签署链接：需要传入签署方用户名字和手机号（或者身份证件信息）参数来生成签署链接。

        - 不支持签署方含有签批控件，或设置了签署方在签署时自行添加签署控件功能的合同进行批量签署。

        - 进行小程序批量签署必须指定待签署的流程id，<font color="red">接口中FlowIds参数必传。</font>'
      operationId: CreateBatchSignUrl
      parameters:
      - in: body
        schema:
          $ref: '#/body_definitions/CreateBatchSignUrlRequest'
      produces:
      - application/json
      responses:
        '200':
          schema:
            $ref: '#/body_definitions/CreateBatchSignUrlResponse'
      x-tcapi-action-label: []
      x-tcapi-action-name: 获取跳转至腾讯电子签小程序的批量签署链接
      x-tcapi-cam-condition: ''
      x-tcapi-cam-resource: '*'
      x-tcapi-category: 创建签署流程相关接口
      x-tcapi-cli-visibility: 1
      x-tcapi-doc-weight: 8980
      x-tcapi-errorcodes:
      - InvalidParameter
      - MissingParameter
      - InternalError
      - FailedOperation
      - OperationDenied
      - InternalError.Api
      - InternalError.Db
      - UnauthorizedOperation.NoPermissionFeature
      x-tcapi-examples:
      - description: '合同（yDR1AUUgygja******uO4zjEB8zAkJEFN）中的参与方为：【姓名：张三 ，手机号：18888888888】，发起的时候并未填入证件号且18888888888手机号并未在腾讯电子签注册实名。


          此时，如果使用 【姓名：张三，手机号：17777777777】生成批量签署链接，且FlowIds参数传入（yDR1AUUgygja******uO4zjEB8zAkJEFN）时，会报错，提示签署方信息不存在。因为手机号不同，无法定位到签署方。


          此时，除了将手机号修改成 18888888888 之外来解决问题，也可以在发起合同和生成链接的时候传入证件信息，保证姓名和证件一致的情况下，手机号可以不相同。

          '
        input: "POST / HTTP/1.1\nHost:  ess.tencentcloudapi.com\nContent-Type: application/json\n\
          X-TC-Action: CreateBatchSignUrl\n<公共请求参数>\n\n{\n    \"IdCardNumber\": \"\
          \",\n    \"IdCardType\": \"\",\n    \"Name\": \"张三\",\n    \"NotifyType\"\
          : \"SMS\",\n    \"Mobile\": \"17777777777\",\n    \"Operator\": {\n    \
          \    \"UserId\": \"yDRCLUUgygq2******uO4zjEwg0vjoimj\"\n    },\n    \"FlowIds\"\
          :[\"yDR1AUUgygja******uO4zjEB8zAkJEFN\"]\n}"
        output: "{\n  \"Response\": {\n    \"Error\": {\n            \"Code\": \"\
          InvalidParameter\",\n            \"Message\": \"合同[yDR1AUUgygja******uO4zjEB8zAkJEFN]不包含链接中的参与方信息,\
