  /ModifyExtendedService:
    post:
      description: "管理企业扩展服务\n\n- **直接开通的情形：** 若在操作过程中接口没有返回跳转链接，这表明无需进行任何跳转操作。此时，相应的企业高级签署能力将会直接被开通或关闭。\n\
        \n- **需要法人或者超管签署开通协议的情形：** 当需要开通以下企业高级签署能力时， 系统将返回一个操作链接。贵方需要主动联系并通知企业的超级管理员（超管）或法人。由他们点击该链接，完成服务的开通操作。\n\
        \  - **OPEN_SERVER_SIGN（企业自动签）**\n\n注意： `在调用此接口以管理企业扩展服务时，操作者（入参中的Operator）必须是企业的超级管理员（超管）或法人`\n\
        \n\n对应的扩展服务能力可以在控制台的【高级签署能力】中找到\n\n![image](https://qcloudimg.tencent-cloud.cn/raw/70750ae61500bb9ef6c6be6ecd18cd0e/a2222.png)\n\
        ![image](https://qcloudimg.tencent-cloud.cn/raw/8cb6c8707a3b8c86b55e47fd8d23b30a/a3333.png)"
      operationId: ModifyExtendedService
      parameters:
      - in: body
        schema:
          $ref: '#/body_definitions/ModifyExtendedServiceRequest'
      produces:
      - application/json
      responses:
        '200':
          schema:
            $ref: '#/body_definitions/ModifyExtendedServiceResponse'
      x-tcapi-action-label: []
      x-tcapi-action-name: 管理企业扩展服务
