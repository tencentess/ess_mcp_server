          :[{\"Children\":[],\"DataLabel\":0,\"DataRange\":0,\"DataTo\":\"\",\"DataType\"\
          :0,\"Hide\":0,\"IsChecked\":false,\"Key\":\"UserFlowTypesManagement\",\"\
          Name\":\"合同类型管理\",\"ParentKey\":\"\",\"Type\":1},{\"Children\":[{\"Children\"\
          :[{\"Children\":[],\"DataLabel\":2,\"DataRange\":1,\"DataTo\":\"\",\"DataType\"\
