        title: 创建一份涉及本方企业自动签署和个人签署的B2C合同
      - description: '1. 签署方包括本方企业、他方企业和个人（Approvers中有三个ApproverInfo元素）。

          2. 所有签署方企业都不包允许有签署控件。

          3. 设置当前流程为可拖拽（SignBeanTag）。

          4. 本合同为无序签署（Unordered传递为true）。'
