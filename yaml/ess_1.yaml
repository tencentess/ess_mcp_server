        x-tcapi-visibility: 1
      ApproverName:
        description: '签署方经办人的姓名。

          经办人的姓名将用于身份认证和电子签名，请确保填写的姓名为签署方的真实姓名，而非昵称等代名。'
        disabled: false
        example: 张三
        nullable: false
        type: string
        x-tcapi-reference: []
        x-tcapi-visibility: 1
      ApproverNeedSignReview:
        description: '此签署人（员工或者个人）签署前，是否需要发起方企业审批，取值如下：

          <ul><li>**false**：（默认）不需要审批，直接签署。</li>

          <li>**true**：需要走审批流程。当到对应参与人签署时，会阻塞其签署操作，等待企业内部审批完成。</li></ul>

          企业可以通过CreateFlowSignReview审批接口通知腾讯电子签平台企业内部审批结果

          <ul><li>如果企业通知腾讯电子签平台审核通过，签署方可继续签署动作。</li>

          <li>如果企业通知腾讯电子签平台审核未通过，平台将继续阻塞签署方的签署动作，直到企业通知平台审核通过。</li></ul>


          注：`此功能可用于与发起方企业内部的审批流程进行关联，支持手动、静默签署合同`


          ![image](https://qcloudimg.tencent-cloud.cn/raw/b14d5188ed0229d1401e74a9a49cab6d.png)'
        disabled: false
        example: 'false'
        format: bool
        nullable: false
        type: boolean
        x-tcapi-reference: []
        x-tcapi-visibility: 1
      ApproverOption:
        description: '可以控制签署方在签署合同时能否进行某些操作，例如拒签、转交他人等。

          详细操作可以参考开发者中心的ApproverOption结构体。'
