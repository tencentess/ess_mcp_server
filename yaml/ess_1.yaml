      - description: '更新角色并同时设置角色中的权限内容，设置权限树参数 PermissionGroups ，PermissionGroups
          展开为树形结构，可以需要的权限节点下将 IsChecked 属性设置为true。

          注意：父权限节点 IsChecked 属性为true，则需要将其下所有子节点的 IsChecked属性同时设置为true，否则校验不通过。'
