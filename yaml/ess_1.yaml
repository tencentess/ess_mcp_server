        title: 创建一份涉及本方企业、他方企业和个人签署的三方无序签署合同
      - description: '1. 签署方包括本方企业、他方企业和个人（Approvers中有三个ApproverInfo元素）。

          2. 本方企业的签署区包含两个签署控件：骑缝章和印章（SignComponents中有两个Component元素，骑缝章（SIGN_PAGING_SEAL）采用绝对定位，即指定具体的ComponentHeight/ComponentWidth/ComponentPosX/ComponentPosY/ComponentPage方式；印章（SIGN_SEAL）使用表单域定位方式，即GenerateMode
          = FIELD）。

          3. 他方企业参与者仅具有一个印章签署控件（SignComponents中仅有一个Component元素，且该元素的ComponentType为SIGN_SEAL，使用表单域定位方式，即GenerateMode
          = FIELD）。

