  /CreateDocument:
    post:
      description: "创建签署流程电子文档<br />\n\n###  调用流程\n该接口需要给对应的流程指定一个模板id，并且填充该模板中需要补充的信息。需要配置<a\
        \ href=\"https://qian.tencent.com/developers/companyApis/startFlows/CreateFlow\"\
        \ target=\"_blank\">创建签署流程</a>和<a href=\"https://qian.tencent.com/developers/companyApis/startFlows/StartFlow\"\
        \ target=\"_blank\">发起签署流程</a>接口使用。具体逻辑可以参考下图:\n\n![image](https://qcloudimg.tencent-cloud.cn/raw/1f38ebd7c5afed8763ad961741d81438.png)\n\
        \n\n### 填充模板中定义的填写控件\n模板中配置的<font color=\"red\">发起人填充控件</font>可以通过本接口的**FormFields数组**字段填充。\n\
        \n**<font color=\"red\">填充填写控件需要进行Pdf合成工作，文档合成完成后会收到[合同文档合成完成回调](https://qian.tencent.com/developers/company/callback_types_contracts_sign#%E4%B9%9D-%E5%90%88%E5%90%8C%E6%96%87%E6%A1%A3%E5%90%88%E6%88%90%E5%AE%8C%E6%88%90%E5%9B%9E%E8%B0%83),建议在收到此回调后再调用\
        \ [StartFlow](https://qian.tencent.com/developers/companyApis/startFlows/StartFlow)\
        \ 接口。</font>**\n\n![image](https://qcloudimg.tencent-cloud.cn/raw/37457e0e450fc221effddfcb8b1bad55.png)\n\
        \n填充的传参示例如下\n\n```\n    request.FormFields = [{\n            \"ComponentName\"\
        : \"项目的名字\",\n            \"ComponentValue\": \"休闲山庄\"\n        }, {\n   \
        \         \"ComponentName\": \"项目的地址\",\n            \"ComponentValue\": \"\
        凤凰山北侧\",\n        }, {\n            \"ComponentName\": \"范围\",\n         \
        \   \"ComponentValue\": \"凤凰山至107国道\",\n        }, {\n            \"ComponentName\"\
        : \"面积\",\n            \"ComponentValue\": \"100亩\",\n        }, {\n     \
        \       \"ComponentName\": \"基本情况\",\n            \"ComponentValue\": \"完好\"\
        ,\n        }, , {\n            \"ComponentName\": \"用途\",\n            \"\
        ComponentValue\": \"经营农家乐\",\n        }\n    ]\n```\n合成后合同样子示例\n\n![image](https://qcloudimg.tencent-cloud.cn/raw/140a2fb771ac66a185d0a000d37485f6.png)"
      operationId: CreateDocument
