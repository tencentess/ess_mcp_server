        example: 无
        nullable: false
        schema:
          $ref: '#/definitions/ApproverOption'
        x-tcapi-reference: []
        x-tcapi-visibility: 1
      ApproverRole:
        description: '收据场景设置签署人角色类型, 可以设置如下<b>类型</b>:

          <ul><li> **1**  :收款人</li>

          <li>   **2**   :开具人</li>

          <li>   **3** :见证人</li></ul>

          注: `收据场景为白名单功能，使用前请联系对接的客户经理沟通。`'
        disabled: false
        example: '1'
        format: int64
        nullable: false
        type: integer
        x-tcapi-reference: []
        x-tcapi-visibility: 1
      ApproverRoleName:
        description: '可以自定义签署人角色名：收款人、开具人、见证人等，长度不能超过20，只能由中文、字母、数字和下划线组成。


          注: `如果是用模板发起, 优先使用此处上传的, 如果不传则用模板的配置的`'
        disabled: false
        example: 收款人
        nullable: false
        type: string
        x-tcapi-reference: []
        x-tcapi-visibility: 1
      ApproverSignTypes:
        description: '【在用文件发起合同场景下才有效，模板发起场景下需要在模板中配置】您可以指定签署方签署合同的认证校验方式，可传递以下值：

          <ul><li>**1**：人脸认证，需进行人脸识别成功后才能签署合同；</li>

          <li>**2**：签署密码，需输入与用户在腾讯电子签设置的密码一致才能校验成功进行合同签署；</li>

          <li>**3**：运营商三要素，需到运营商处比对手机号实名信息（名字、手机号、证件号）校验一致才能成功进行合同签署。（如果是港澳台客户，建议不要选择这个）</li>

          <li>**5**：设备指纹识别，需要对比手机机主预留的指纹信息，校验一致才能成功进行合同签署。（iOS系统暂不支持该校验方式）</li>

          <li>**6**：设备面容识别，需要对比手机机主预留的人脸信息，校验一致才能成功进行合同签署。（Android系统暂不支持该校验方式）</li></ul>



          默认为：

          1(人脸认证 ),2(签署密码),3(运营商三要素),5(设备指纹识别),6(设备面容识别)


          注：

          1. 用<font color=''red''>模板创建合同场景</font>, 签署人的认证方式需要在配置模板的时候指定, <font color=''red''>在创建合同重新指定无效</font>

          2. 运营商三要素认证方式对手机号运营商及前缀有限制,可以参考[运营商支持列表类](https://qian.tencent.com/developers/company/mobile_support)得到具体的支持说明

          3. 校验方式不允许只包含<font color=''red''>设备指纹识别</font>和<font color=''red''>设备面容识别</font>，至少需要再增加一种其他校验方式。

          4. <font color=''red''>设备指纹识别</font>和<font color=''red''>设备面容识别</font>只支持小程序使用，其他端暂不支持。'
        disabled: false
        example: '[1,2,3]'
        items:
          format: int64
          type: integer
        nullable: false
        type: array
        x-tcapi-reference: []
        x-tcapi-visibility: 1
      ApproverSource:
        description: 在企微场景下使用，需设置参数为**WEWORKAPP**，以表明合同来源于企微。
        disabled: false
        example: WEWORKAPP
        nullable: false
        type: string
        x-tcapi-reference: []
        x-tcapi-visibility: 1
      ApproverType:
        description: '在指定签署方时，可选择企业B端或个人C端等不同的参与者类型，可选类型如下:

          **0**：企业

          **1**：个人

          **3**：企业静默签署

          注：`类型为3（企业静默签署）时，此接口会默认完成该签署方的签署。静默签署仅进行盖章操作，不能自动签名。`

          **7**: 个人自动签署，适用于个人自动签场景。

          注: `个人自动签场景为白名单功能，使用前请联系对接的客户经理沟通。`'
        disabled: false
        example: '0'
        format: int64
        nullable: false
        type: integer
        x-tcapi-reference: []
        x-tcapi-visibility: 1
      ApproverVerifyTypes:
        description: "【在用文件发起合同场景下才有效，模板发起场景下需要在模板中配置】指定个人签署方查看合同的校验方式,可以传值如下:\n<ul><li>\
          \  **1**   : （默认）人脸识别,人脸识别后才能合同内容</li>\n<li>  **2**  : 手机号验证, 用户手机号和参与方手机号(ApproverMobile)相同即可查看合同内容（当手写签名方式为OCR_ESIGN时，该校验方式无效，因为这种签名方式依赖实名认证）\n\
          </li></ul>\n注: \n<ul><li>如果合同流程设置ApproverVerifyType查看合同的校验方式,    则忽略此签署人的查看合同的校验方式</li>\n\
          <li>此字段可传多个校验方式</li></ul>\n\n"
