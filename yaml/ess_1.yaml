  /UploadFiles:
    post:
      description: "此接口（UploadFiles）文件上传。<br/>\n\n适用场景：用于合同，印章的文件上传。文件上传以后，\n如果是PDF格式文件可配合<a\
        \ href=\"https://qian.tencent.com/developers/companyApis/startFlows/CreateFlowByFiles\"\
        \ target=\"_blank\">用PDF文件创建签署流程</a>接口进行合同流程的发起\n如果是其他类型可以配合<a href=\"https://qian.tencent.com/developers/companyApis/templatesAndFiles/CreateConvertTaskApi\"\
        \ target=\"_blank\">创建文件转换任务</a>接口转换成PDF文件\n\n注: \n1. 图片类型(png/jpg/jpeg)限制大小为5M以下,\
        \ PDF/word/excel等其他格式限制大小为60M以下\n2. 调用此接口时需要设置单独的Domain请求域名，<font color=\"\
        red\">联调开发环境为: file.test.ess.tencent.cn，正式环境需要设置为:file.ess.tencent.cn</font>，代码示例\n\
        ```\nHttpProfile httpProfile = new HttpProfile();\nhttpProfile.setEndpoint(\"\
        file.test.ess.tencent.cn\");\n```\n\n<font color=\"red\">相关视频指引</font> <br>\n\
        1. <a href=\"https://dyn.ess.tencent.cn/guide/apivideo/ess_uploadfiles.mp4\"\
        \ target=\"_blank\">上传用于合同发起的PDF文件代码编写示例</a><br>"
      operationId: UploadFiles
      parameters:
      - in: body
        schema:
          $ref: '#/body_definitions/UploadFilesRequest'
