      description: "本接口（CreateBatchOrganizationRegistrationTasks）用于批量创建企业认证链接\n该接口为异步提交任务接口,需要跟查询企业批量认证链接(DescribeBatchOrganizationRegistrationUrls)\
        \ 配合使用.\n\n批量创建链接有以下限制：\n\n1. 单次最多创建10个企业。\n2. 一天同一家企业最多创建8000家企业。\n3. 同一批创建的企业不能重复\
        \ 其中包括 企业名称，企业统一信用代码\n4. 跳转到小程序的实现，参考微信官方文档（分为全屏、半屏两种方式），如何配置也可以请参考: 跳转电子签小程序配置\n\
        \n注：\n\n1. 此接口需要 <font  color=\"red\"><b>购买单独的实名套餐包</b></font>方可调用，如有需求请联系对接人员评估\n\
        \  \n2. 如果生成的链接是APP链接，跳转到小程序的实现，参考微信官方文档（分为<a href=\"https://developers.weixin.qq.com/miniprogram/dev/api/navigate/wx.navigateToMiniProgram.html\"\
        >全屏</a>、<a href=\"https://developers.weixin.qq.com/miniprogram/dev/framework/open-ability/openEmbeddedMiniProgram.html\"\
        >半屏</a>两种方式），如何配置也可以请参考: <a href=\"https://qian.tencent.com/developers/company/openwxminiprogram\"\
        >跳转电子签小程序配置</a>\n  \n\n**腾讯电子签小程序的AppID 和 原始Id如下:**\n\n| 小程序 | AppID | 原始ID\
        \ |\n| --- | --- | --- |\n| 腾讯电子签（正式版） | wxa023b292fd19d41d | gh_da88f6188665\
        \ |\n| 腾讯电子签Demo | wx371151823f6f3edf | gh_39a5d3de69fa |"
