  /CreatePartnerAutoSignAuthUrl:
    post:
      description: "创建一个用于他方自动签授权的链接（可选择他方授权或我方授权）。通过这个链接，合作方企业可以直接进入小程序，进行自动签授权操作。\n\
        \n如果授权企业尚未开通企业自动签功能，该链接还将引导他们首先开通本企业的自动签服务\n\n注: \n1. <font color='red'>所在企业的超管、法人才有权限调用此接口</font>(Operator.UserId\
        \ 需要传递超管或者法人的UserId)\n2. 已经在授权中或者授权成功的企业，无法重复授权\n3. 授权企业和被授权企业必须都是已认证企业\n\
