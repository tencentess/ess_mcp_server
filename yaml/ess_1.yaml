  /CreateSchemeUrl:
    post:
      description: '获取跳转至腾讯电子签小程序的签署链接


        适用场景：如果需要签署人在自己的APP、小程序、H5应用中签署，可以通过此接口获取跳转腾讯电子签小程序的签署跳转链接。


        跳转到小程序的实现，参考微信官方文档（分为<a href="https://developers.weixin.qq.com/miniprogram/dev/api/navigate/wx.navigateToMiniProgram.html">全屏</a>、<a
        href="https://developers.weixin.qq.com/miniprogram/dev/framework/open-ability/openEmbeddedMiniProgram.html">半屏</a>两种方式），如何配置也可以请参考:
        <a href="https://qian.tencent.com/developers/company/openwxminiprogram">跳转电子签小程序配置</a>


        注：

        <ul><li>1. 如果签署人是在PC端扫码签署，可以通过生成跳转链接自主转换成二维码，让签署人在PC端扫码签署</li>

        <li>2. 签署链接的有效期为<font color="red">90天</font>，超过有效期链接不可用</li>

        <li>3. 如果需跳转详情页（即PathType值为1）进行填写或签署合同，需指定签署方信息:姓名、手机号码、企业名称等，才能生成正确的跳转链接</li>

        <li>4. <font color="red">生成的链路后面不能再增加参数</font>（会出现覆盖链接中已有参数导致错误）</li></ul>


        其中小程序的原始Id如下，或者查看小程序信息自助获取。


        | 小程序 | AppID | 原始ID |

        | ------------ | ------------ | ------------ |

        | 腾讯电子签（正式版） | wxa023b292fd19d41d | gh_da88f6188665 |

        | 腾讯电子签Demo | wx371151823f6f3edf | gh_39a5d3de69fa |'
      operationId: CreateSchemeUrl
      parameters:
      - in: body
        schema:
          $ref: '#/body_definitions/CreateSchemeUrlRequest'
      produces:
      - application/json
      responses:
        '200':
          schema:
            $ref: '#/body_definitions/CreateSchemeUrlResponse'
      x-tcapi-action-label: []
      x-tcapi-action-name: 获取跳转至腾讯电子签小程序的签署链接
      x-tcapi-cam-condition: ''
      x-tcapi-cam-resource: '*'
      x-tcapi-category: 创建签署流程相关接口
      x-tcapi-cli-visibility: 1
      x-tcapi-doc-weight: 8981
      x-tcapi-errorcodes:
      - InvalidParameterValue
      - MissingParameter
      - InternalError
      - ResourceUnavailable
      - FailedOperation
      - OperationDenied
      - InvalidParameter.ParamError
      - InternalError.System
      - OperationDenied.Forbid
      - InvalidParameter.DataNotFound
      - OperationDenied.NoIdentityVerify
      - InternalError.Db
      - OperationDenied.NoLogin
      - ResourceNotFound.Application
      - InternalError.DbRead
      - ResourceNotFound.Flow
      - InvalidParameter.Name
      - InvalidParameter.Mobile
      - OperationDenied.WhiteListForbid
      - OperationDenied.NoSupportJumpPage
      - OperationDenied.NoFlowPermission
