body_definitions:
  BindEmployeeUserIdWithClientOpenIdRequest:
    properties:
      Agent:
        $ref: '#/definitions/Agent'
        description: '代理企业和员工的信息。

          在集团企业代理子企业操作的场景中，需设置此参数。在此情境下，ProxyOrganizationId（子企业的组织ID）为必填项。'
        disabled: false
        example: 无
        x-tcapi-reference: []
        x-tcapi-visibility: 1
      OpenId:
        description: 员工在贵司业务系统中的唯一身份标识，用于与腾讯电子签账号进行映射，确保在同一企业内不会出现重复。 该标识最大长度为64位字符串，仅支持包含26个英文字母和数字0-9的字符。
        disabled: false
        example: n9527
        type: string
        x-tcapi-reference: []
        x-tcapi-visibility: 1
      Operator:
        $ref: '#/definitions/UserInfo'
        description: '执行本接口操作的员工信息。使用此接口时，必须填写UserId。

          注: `在调用此接口时，请确保指定的员工已获得所需的接口调用权限，并具备接口传入的相应资源的数据权限。`'
        disabled: false
        example: 无
        x-tcapi-reference: []
        x-tcapi-visibility: 1
      UserId:
        description: '员工在腾讯电子签平台的唯一身份标识，为32位字符串。


          通过<a href="https://qian.tencent.com/developers/companyApis/staffs/DescribeIntegrationEmployees"
          target="_blank">DescribeIntegrationEmployees</a>接口获取，也可登录腾讯电子签控制台查看

          ![image](https://qcloudimg.tencent-cloud.cn/raw/97cfffabb0caa61df16999cd395d7850.png)'
        disabled: false
        example: yDtwEUUckp7f8w6uUuBHsZJd9KcpXpMH
        type: string
        x-tcapi-reference: []
        x-tcapi-visibility: 1
    required:
    - Operator
    - UserId
    - OpenId
    type: object
  BindEmployeeUserIdWithClientOpenIdResponse:
    properties:
      Status:
        description: '绑定是否成功。

          <ul><li>**0**：失败</li><li>**1**：成功</li></ul>'
        disabled: false
        example: '1'
        format: int64
        nullable: false
        type: integer
        x-tcapi-reference: []
        x-tcapi-visibility: 1
    type: object
    x-tcapi-output-required:
    - Status
  CancelFlowRequest:
    properties:
      Agent:
        $ref: '#/definitions/Agent'
        description: '代理企业和员工的信息。

          在集团企业代理子企业操作的场景中，需设置此参数。在此情境下，ProxyOrganizationId（子企业的组织ID）为必填项。'
        disabled: false
        example: 无
        x-tcapi-reference: []
        x-tcapi-visibility: 1
      CancelMessage:
        description: '撤销此合同流程的**撤销理由**，最多支持200个字符长度。只能由中文、字母、数字、中文标点和英文标点组成（不支持表情）。


          ![image](https://qcloudimg.tencent-cloud.cn/raw/f16cf37dbb3a09d6569877f093b92204/channel_ChannelCancelFlow.png)'
        disabled: false
        example: 这个合同里边的付款金额写错
        type: string
        x-tcapi-reference: []
        x-tcapi-visibility: 1
      FlowId:
        description: '合同流程ID, 为32位字符串。


          可登录腾讯电子签控制台，[点击查看FlowId在控制台中的位置](https://qcloudimg.tencent-cloud.cn/raw/0a83015166cfe1cb043d14f9ec4bd75e.png)'
        disabled: false
        example: yDwFmUUckpstqfvzUE1h3jo1f3cqjkGm
        type: string
        x-tcapi-reference: []
        x-tcapi-visibility: 1
      Operator:
        $ref: '#/definitions/UserInfo'
        description: '执行本接口操作的员工信息。

          注: `在调用此接口时，请确保指定的员工已获得所需的接口调用权限，并具备接口传入的相应资源的数据权限。`'
        disabled: false
        example: 无
        x-tcapi-reference: []
        x-tcapi-visibility: 1
    required:
    - Operator
    - FlowId
    - CancelMessage
    type: object
  CancelFlowResponse:
    properties: {}
    type: object
    x-tcapi-output-required: []
  CancelUserAutoSignEnableUrlRequest:
    properties:
      Agent:
        $ref: '#/definitions/Agent'
        description: '代理企业和员工的信息。

          在集团企业代理子企业操作的场景中，需设置此参数。在此情境下，ProxyOrganizationId（子企业的组织ID）为必填项。'
        disabled: false
        example: 无
        x-tcapi-reference: []
        x-tcapi-visibility: 1
      Operator:
        $ref: '#/definitions/UserInfo'
        description: '执行本接口操作的员工信息。

          注: `在调用此接口时，请确保指定的员工已获得所需的接口调用权限，并具备接口传入的相应资源的数据权限。`'
        disabled: false
        example: 无
        x-tcapi-reference: []
        x-tcapi-visibility: 1
      SceneKey:
        description: '自动签使用的场景值, 可以选择的场景值如下:

          <ul><li> **E_PRESCRIPTION_AUTO_SIGN** :  电子处方场景</li><li> **OTHER** :  通用场景</li></ul>'
        disabled: false
        example: E_PRESCRIPTION_AUTO_SIGN
        type: string
        x-tcapi-reference: []
        x-tcapi-visibility: 1
      UserInfo:
        $ref: '#/definitions/UserThreeFactor'
        description: '预撤销链接的用户信息，包含姓名、证件类型、证件号码等信息。

          '
        disabled: false
        example: 无
        x-tcapi-reference: []
        x-tcapi-visibility: 1
    required:
    - Operator
    - SceneKey
    - UserInfo
    type: object
  CancelUserAutoSignEnableUrlResponse:
    properties: {}
    type: object
    x-tcapi-output-required: []
  CreateBatchAdminChangeInvitationsRequest:
    properties:
      AdminChangeInvitationInfos:
        description: '组织机构超管变更信息。

          一次最多支持10条超管变更信息。'
        disabled: false
        example: 无
        items:
          $ref: '#/definitions/AdminChangeInvitationInfo'
        type: array
        x-tcapi-reference: []
        x-tcapi-visibility: 1
      Agent:
        $ref: '#/definitions/Agent'
        description: '代理企业和员工的信息。

          在集团企业代理子企业操作的场景中，需设置此参数。在此情境下，ProxyOrganizationId（子企业的组织ID）为必填项。'
        disabled: false
        example: 无
        x-tcapi-reference: []
        x-tcapi-visibility: 1
      Operator:
        $ref: '#/definitions/UserInfo'
        description: '执行本接口操作的员工信息。

          注: `在调用此接口时，请确保指定的员工已获得所需的接口调用权限，并具备接口传入的相应资源的数据权限。`'
        disabled: false
        example: 无
        x-tcapi-reference: []
        x-tcapi-visibility: 1
    required:
    - Operator
    - AdminChangeInvitationInfos
    type: object
  CreateBatchAdminChangeInvitationsResponse:
    properties:
      ErrorMessages:
        description: '批量生成企业认证链接的详细错误信息，

          顺序与输入参数保持一致。

          若企业认证均成功生成，则不返回错误信息；

          若存在任何错误，则返回具体的错误描述。'
        disabled: false
        example: '["第【1】条超管变更信息参数错误，当前企业的超管与指定的超管一致，不需要进行变更"]'
        items:
          type: string
        nullable: false
        type: array
        x-tcapi-reference: []
        x-tcapi-visibility: 1
    type: object
    x-tcapi-output-required: []
  CreateBatchAdminChangeInvitationsUrlRequest:
    properties:
      Endpoint:
        description: '要跳转的链接类型

          <ul>

          <li> **HTTP**：跳转电子签小程序的http_url，短信通知或者H5跳转适合此类型 ，此时返回长链 （默认类型）。</li><li>**HTTP_SHORT_URL**：跳转电子签小程序的http_url，短信通知或者H5跳转适合此类型，此时返回短链。</li><li>**APP**：
          第三方APP或小程序跳转电子签小程序的path，APP或者小程序跳转适合此类型。</li>

          <li>**QR_CODE**： 跳转电子签小程序的http_url的二维码形式，可以在页面展示适合此类型。</li>

          </ul>'
        disabled: false
        example: APP
        type: string
        x-tcapi-reference: []
        x-tcapi-visibility: 1
      NewAdminIdCardNumber:
        description: "组织机构要变更的超管证件号。 \n在超管变更流程中，必须是超管本人进行操作，需要更当前操作人的证件号保持一致。\n\n\
          超管手机号和超管证件号 二选一必填。"
        disabled: false
        example: 640521***113278
        type: string
        x-tcapi-reference: []
        x-tcapi-visibility: 1
      NewAdminIdCardType:
        description: '组织机构要变更的超管证件类型支持以下类型

          - ID_CARD : 中国大陆居民身份证 (默认值)

          -  HONGKONG_AND_MACAO : 中国港澳居民来往内地通行证

          - HONGKONG_MACAO_AND_TAIWAN : 中国港澳台居民居住证(格式同中国大陆居民身份证)

          需要更当前操作人的证件类型保持一致。

          '
        disabled: false
        example: ID_CARD
        type: string
        x-tcapi-reference: []
        x-tcapi-visibility: 1
      NewAdminMobile:
        description: "组织机构要变更的超管手机号。 \n在超管变更流程中，必须是超管本人进行操作，需要更当前操作人的手机号保持一致。\n\n\
          超管手机号 和超管证件号 二选一 必填。\n\n注意：\n1. 如果新超管的个人身份在电子签进行了手机号的变更，之前提交的超管变更任务将无法获取。"
        disabled: false
        example: 1320***007
        type: string
        x-tcapi-reference: []
        x-tcapi-visibility: 1
      NewAdminName:
        description: '组织机构要变更的超管姓名。 在超管变更流程中，必须是超管本人进行操作，需要更当前操作人的姓名保持一致。

          '
        disabled: false
        example: 典子谦
        type: string
        x-tcapi-reference: []
        x-tcapi-visibility: 1
      NotifyType:
        description: "通知方式。\n NONE（默认）\n SMS  - 如果使用这个方式，则会给即将变更的超管发信息。\n注意：\n发送信息的手机号，是用户传递的手机号。\n\
          如果用户同时传递了证件号，手机号会被用户在电子签注册的手机号进行覆盖。"
        disabled: false
        example: NONE
        type: string
        x-tcapi-reference: []
        x-tcapi-visibility: 1
      Operator:
        $ref: '#/definitions/UserInfo'
        description: '执行本接口操作的员工信息。

          注: `在调用此接口时，请确保指定的员工已获得所需的接口调用权限，并具备接口传入的相应资源的数据权限。`'
        disabled: false
        example: 无
        x-tcapi-reference: []
        x-tcapi-visibility: 1
    required:
    - Operator
    - NewAdminName
    type: object
  CreateBatchAdminChangeInvitationsUrlResponse:
    properties:
      ExpireTime:
        description: 链接过期时间，为 7 天后，创建时间，格式为Unix标准时间戳（秒）。
        disabled: false
        example: '1763963107'
        format: uint64
        nullable: false
        type: integer
        x-tcapi-reference: []
        x-tcapi-visibility: 1
      Url:
        description: "批量企业注册链接-单链接包含多条认证流，根据Endpoint的不同设置，返回不同的链接地址。失效时间：7天\n跳转链接,\
          \ 链接的有效期根据企业,员工状态和终端等有区别, 可以参考下表\n<table> <thead> <tr> <th>Endpoint</th>\
          \ <th>示例</th> <th>链接有效期限</th> </tr> </thead>  <tbody>\n <tr> <td>HTTP</td>\
          \ <td>https://res.ess.tencent.cn/cdn/h5-activity-dev/jump-mp.html?to=AUTHORIZATION_ENTERPRISE_FOR_BATCH_SUBMIT&shortKey=yDCHHURDfBxSB2rj2Bfa</td>\
          \ <td>7天</td> </tr> \n<tr> <td>HTTP_SHORT_URL</td> <td>https://test.essurl.cn/8gDKUBAWK8</td>\
          \ <td>7天</td> </tr> \n<tr> <td>APP</td> <td>pages/guide/index?to=AUTHORIZATION_ENTERPRISE_FOR_BATCH_SUBMIT&shortKey=yDCHpURDfR6iEkdpsDde</td>\
          \ <td>7天</td> </tr><tr> <td>QR_CODE</td> <td>https://dyn.test.ess.tencent.cn/imgs/qrcode_urls/authorization_enterprise_for_batch_submit/yDCHHUUckpbdauq9UEjnoFDCCumAMmv1.png</td>\
          \ <td>7天</td> </tr> </tbody> </table>\n注： \n`1.创建的链接应避免被转义，如：&被转义为\\u0026；如使用Postman请求后，请选择响应类型为\
          \ JSON，否则链接将被转义`\n"
        disabled: false
        example: pages/guide/index?to=BATCH_CHANGE_SUPER_ADMIN&shortKey=yDtzZUX5uY7W5lPn8P47
        nullable: false
        type: string
        x-tcapi-reference: []
        x-tcapi-visibility: 1
    type: object
    x-tcapi-output-required: []
  CreateBatchCancelFlowUrlRequest:
    properties:
      Agent:
        $ref: '#/definitions/Agent'
        description: '代理企业和员工的信息。

          <br/>在集团企业代理子企业操作的场景中，需设置此参数。在此情境下，ProxyOrganizationId（子企业的组织ID）为必填项。'
        disabled: false
        example: 无
        x-tcapi-reference: []
        x-tcapi-visibility: 1
      FlowIds:
        description: '需要执行撤回的流程(合同)的编号列表，最多100个.

          列表中的流程(合同)编号不要重复.'
        disabled: false
        example: '["yDt1JUUckp77a2omUyEmko88eg49PTsN"]'
        items:
          type: string
        type: array
        x-tcapi-reference: []
        x-tcapi-visibility: 1
      Operator:
        $ref: '#/definitions/UserInfo'
        description: '执行本接口操作的员工信息。

          <br/>注: `在调用此接口时，请确保指定的员工已获得所需的接口调用权限，并具备接口传入的相应资源的数据权限。'
        disabled: false
        example: 无
        x-tcapi-reference: []
        x-tcapi-visibility: 1
    required:
    - Operator
    - FlowIds
    type: object
  CreateBatchCancelFlowUrlResponse:
    properties:
      BatchCancelFlowUrl:
        description: 批量撤回签署流程链接
        disabled: false
        example: https://qian.tencent.cn/code=yDtwRUUckp7fyqz6UuQZAp18BNrB74xu
        nullable: false
        type: string
        x-tcapi-reference: []
        x-tcapi-visibility: 1
      FailMessages:
        description: '签署流程撤回失败信息

          数组里边的错误原因与传进来的FlowIds一一对应,如果是空字符串则标识没有出错'
        disabled: false
        example: '["合同已经过期"]'
        items:
          type: string
        nullable: false
        type: array
        x-tcapi-reference: []
        x-tcapi-visibility: 1
      TaskId:
        description: 批量撤销任务编号，为32位字符串，可用于[查询批量撤销签署流程任务结果](https://qian.tencent.com/developers/companyApis/operateFlows/CreateBatchCancelFlowUrl)
          或关联[批量撤销任务结果回调](https://qian.tencent.com/developers/company/callback_types_contracts_sign#%E4%B9%9D-%E6%89%B9%E9%87%8F%E6%92%A4%E9%94%80%E7%BB%93%E6%9E%9C%E5%9B%9E%E8%B0%83)
        disabled: false
        example: yDxbNUyKQDx3oAUuO4zjEBQGidlGe4hP
        nullable: false
        type: string
        x-tcapi-reference: []
        x-tcapi-visibility: 1
      UrlExpireOn:
        description: '签署连接过期时间字符串：年月日-时分秒

          '
        disabled: false
        example: '2023-07-28 17:25:59'
        nullable: false
        type: string
        x-tcapi-reference: []
        x-tcapi-visibility: 1
    type: object
    x-tcapi-output-required:
    - BatchCancelFlowUrl
    - FailMessages
    - UrlExpireOn
    - TaskId
  CreateBatchContractReviewTaskRequest:
    properties:
      Agent:
        $ref: '#/definitions/Agent'
        description: '代理企业和员工的信息。

          在集团企业代理子企业操作的场景中，需设置此参数。在此情境下，ProxyOrganizationId（子企业的组织ID）为必填项。'
        disabled: false
        example: 无
        x-tcapi-reference: []
        x-tcapi-visibility: 1
      ChecklistId:
        description: '用户配置的审查清单ID，基于此清单ID批量创建合同审查任务，为32位字符串。

          [点击查看审查清单ID在控制台上的位置](https://qcloudimg.tencent-cloud.cn/raw/2c6588549e28ca49bd8bb7f4a072b19e.png)。如果用户不做此配置大模型会根据合同内容在当前企业下的审查清单和系统默认的清单中选择一个清单进行审查。'
        disabled: false
        example: yDtCMUUckpx3boo7UysNTh4vx0j0a6Ii
        type: string
        x-tcapi-reference: []
        x-tcapi-visibility: 1
      Comment:
        description: 备注信息，长度不能超过100个字符
        disabled: false
        example: 备注信息
        type: string
        x-tcapi-reference: []
        x-tcapi-visibility: 1
      EnableGeneralChecklist:
        description: '启用附加通用风险审查清单。默认为启用状态

          可选值如下：


          - 1: 启用系统提供的附加通用风险审查清单

          - 2:不启用系统提供的附加通用风险审查清单'
        disabled: false
        example: '0'
        format: int64
        type: integer
        x-tcapi-reference: []
        x-tcapi-visibility: 1
      Operator:
        $ref: '#/definitions/UserInfo'
        description: '执行合同审查任务的员工信息。

          注: `在调用此接口时，请确保指定的员工已获得所需的接口调用权限，并具备接口传入的相应资源的数据权限。`'
        disabled: false
        example: 无
        x-tcapi-reference: []
        x-tcapi-visibility: 1
      PolicyType:
        description: "合同审查的审查尺度。默认为`0`严格尺度\n\n审查尺度如下：\n<ul>\n    <li>**0** - 【严格】以保护己方利益为核心，对合同条款进行严格把控，尽可能争取对己方有利的条款，同时对对方提出的不合理条款可进行坚决修改或删除。</li>\
          \ \n    <li>**1** - 【中立】以公平合理为原则，平衡双方的权利义务，既不过分强调己方利益，也不过度让步，力求达成双方均可接受的条款。</li>\
          \   \n    <li>**2** - 【宽松】以促成交易为核心，对合同条款的修改要求较为宽松，倾向于接受对方提出的条款，以尽快达成合作。</li>\
          \  \n</ul>"
        disabled: false
        example: '0'
        format: int64
        type: integer
        x-tcapi-reference: []
        x-tcapi-visibility: 1
      ResourceIds:
        description: "合同审查的PDF文件资源编号列表，通过[UploadFiles](https://qian.tencent.com/developers/companyApis/templatesAndFiles/UploadFiles)接口获取PDF文件资源编号。\
          \ \n\n注:  `目前，此接口仅支持5个文件发起。每个文件限制在10M以下，文件必须是PDF格式`"
        disabled: false
        example: '["yDRS4UUgygqdcj56UuO4zjExBQcOiB68","yDRS4UUgygqdcj5pUuO4zjEu602GFIe6"]'
        items:
          type: string
        type: array
        x-tcapi-reference: []
        x-tcapi-visibility: 1
      Role:
        $ref: '#/definitions/RiskIdentificationRoleInfo'
        description: 合同审查中的角色信息，通过明确入参角色的名称和描述，可以提高合同审查的效率和准确性。用户不做配置时大模型会根据合同内容推荐出风险识别角色的名称和描述信息。
        disabled: false
        example: 无
        x-tcapi-reference: []
        x-tcapi-visibility: 1
      UserData:
        description: '调用方自定义的个性化字段(可自定义此名称)，并以base64方式编码，支持的最大数据大小为 1024长度。


          在合同状态变更的回调信息等场景中，该字段的信息将原封不动地透传给贵方。回调的相关说明可参考开发者中心的[回调通知](https://qian.tencent.com/developers/company/callback_types_v2)模块。'
        disabled: false
        example: QmFzZTY0IEJhc2U2NCA
        type: string
        x-tcapi-reference: []
