          X-TC-Action: CreateSchemeUrl\n<公共请求参数>\n\n{\n    \"Operator\": {\n     \
          \   \"UserId\": \"yDRCLUUgygq2xun5UuO4zjEwg0vjoimj\"\n    },\n    \"FlowId\"\
          : \"yDwq7UU*Uu1vFD6uHSIyKQPf\",\n    \"PathType\": 1,\n    \"EndPoint\"\
