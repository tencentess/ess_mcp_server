  /CreateFlowSignReview:
    post:
      description: "提交企业流程审批结果 \n**当前存在两种审核操作：**\n<ul>\n<li>签署审核\n<ul>\n<li>在通过接口<ul>\n\
        <li>CreateFlowByFiles</li>\n<li>CreateFlow</li>\n<li>CreateFlowGroupByTemplates</li>\n\
        <li>CreateFlowGroupByFiles</li>\n<li>CreatePrepareFlow</li>\n</ul> \n发起签署流程时，通过指定NeedSignReview为true，则可以调用此接口，并指定operate=SignReview，以提交企业内部签署审批结果（<font\
        \ color=\"red\">审核对象：本企业合同参与方的签署动作</font>）</li>\n<li>在通过接口\n<ul>\n<li>CreateFlowByFiles</li>\n\
        <li>CreateFlow</li>\n<li>CreateFlowGroupByTemplates</li>\n<li>CreateFlowGroupByFiles</li>\n\
        </ul>\n发起签署流程时，通过指定签署人ApproverNeedSignReview为true，则可以调用此接口，并指定operate=SignReview，并指定RecipientId，以提交企业内部签署审批结果（<font\
        \ color=\"red\">审核对象：本企业、合同企业、自然人合同参与方的签署动作</font>）</li>\n</ul>\n</li>\n\n\
        对应签署人在签署页面会看到下面的提示：\n![image](https://qcloudimg.tencent-cloud.cn/raw/3bf065bf5afa6de862e80da316be1c53.png)\n\
        \n<li>发起审核\n <ul>\n<li>通过接口CreatePrepareFlow指定发起后需要审核，那么可以调用此接口，并指定operate=CreateReview，以提交企业内部审批结果。可以多次提交审批结果，但一旦审批通过，后续提交的结果将无效（<font\
        \ color=\"red\">审核对象：本企业合同发起方的发起动作</font>）\n</li>\n</ul>\n\n对应发起人在发起合同的最后环节会有<b>提交审批</b>的按钮：\n\
        \n![image](https://qcloudimg.tencent-cloud.cn/raw/cb4857b7b57302fdcbcf37dad31214a8.png)\n\
        \n</li>\n</ul>"
