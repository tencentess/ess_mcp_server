  FormField:
    description: "电子文档的控件填充信息。按照控件类型进行相应的填充。\n\n当控件的 ComponentType=‘SIGN_SEAL'时，FormField.ComponentValue填入印章id。\n\
      \n* 可用于指定自动签模板未设置自动签印章时，可由接口传入自动签印章\n* 若指定的控件上已设置ComponentValue，那以已经设置的ComponentValue为准\n\
      \n```\nFormField输入示例：\n{\n    \"ComponentId\": \"componentId1\",\n    \"ComponentValue\"\
      : \"sealId（印章id）\"\n}\n```\n\n当控件的 ComponentType='TEXT'时，FormField.ComponentValue填入文本内容\n\
      \n```\nFormField输入示例：\n{\n    \"ComponentId\": \"componentId1\",\n    \"ComponentValue\"\
      : \"文本内容\"\n}\n```\n\n当控件的 ComponentType='MULTI_LINE_TEXT'时，FormField.ComponentValue填入文本内容，支持自动换行。\n\
      \n```\nFormField输入示例：\n{\n    \"ComponentId\": \"componentId1\",\n    \"ComponentValue\"\
      : \"多行文本内容\"\n}\n```\n\n当控件的 ComponentType='CHECK_BOX'时，FormField.ComponentValue填入true或false文本\n\
      \n```\nFormField输入示例：\n{\n    \"ComponentId\": \"componentId1\",\n    \"ComponentValue\"\
      : \"true\"\n}\n```\n\n当控件的 ComponentType='FILL_IMAGE'时，FormField.ComponentValue填入图片的资源ID\n\
      \n```\nFormField输入示例：\n{\n    \"ComponentId\": \"componentId1\",\n    \"ComponentValue\"\
      : \"yDwhsxxxxxxxxxxxxxxxxxxxxxxxxxxx\"\n}\n```\n\n当控件的 ComponentType='ATTACHMENT'时，FormField.ComponentValue支持填入附件图片或者文件的资源ID列表，以逗号分隔，单个附件控件最多支持6个资源ID；\n\
      支持的文件类型包括doc、docx、xls、xlsx、html、jpg、jpeg、png、bmp、txt、pdf\n\n```\nFormField输入示例：\n\
      {\n    \"ComponentId\": \"componentId1\",\n    \"ComponentValue\": \"yDwhsxxxxxxxxxxxxxxxxxxxxxxxxxx1,yDwhsxxxxxxxxxxxxxxxxxxxxxxxxxx2,yDwhsxxxxxxxxxxxxxxxxxxxxxxxxxx3\"\
      \n}\n```\n\n当控件的 ComponentType='SELECTOR'时，FormField.ComponentValue填入选择的选项内容；\n\
      \n```\nFormField输入示例：\n{\n    \"ComponentId\": \"componentId1\",\n    \"ComponentValue\"\
      : \"选择的内容\"\n}\n```\n\n当控件的 ComponentType='DATE'时，FormField.ComponentValue填入日期内容；\n\
      \n```\nFormField输入示例：\n{\n    \"ComponentId\": \"componentId1\",\n    \"ComponentValue\"\
      : \"2023年01月01日\"\n}\n```\n\n当控件的 ComponentType='DISTRICT'时，FormField.ComponentValue填入省市区内容；\n\
      \n```\nFormField输入示例：\n{\n    \"ComponentId\": \"componentId1\",\n    \"ComponentValue\"\
      : \"广东省深圳市福田区\"\n}\n```\n\n【数据表格传参说明】\n当控件的 ComponentType='DYNAMIC_TABLE'时，FormField.ComponentValue需要传递json格式的字符串参数，用于确定表头&填充数据表格（支持内容的单元格合并）\n\
      输入示例1：\n\n```\n{\n    \"headers\":[\n        {\n            \"content\":\"head1\"\
      \n        },\n        {\n            \"content\":\"head2\"\n        },\n   \
      \     {\n            \"content\":\"head3\"\n        }\n    ],\n    \"rowCount\"\
      :3,\n    \"body\":{\n        \"cells\":[\n            {\n                \"\
      rowStart\":1,\n                \"rowEnd\":1,\n                \"columnStart\"\
      :1,\n                \"columnEnd\":1,\n                \"content\":\"123\"\n\
      \            },\n            {\n                \"rowStart\":2,\n          \
      \      \"rowEnd\":3,\n                \"columnStart\":1,\n                \"\
      columnEnd\":2,\n                \"content\":\"456\"\n            },\n      \
      \      {\n                \"rowStart\":3,\n                \"rowEnd\":3,\n \
      \               \"columnStart\":3,\n                \"columnEnd\":3,\n     \
      \           \"content\":\"789\"\n            }\n        ]\n    }\n}\n```\n\n\
      输入示例2（表格表头宽度比例配置）：\n\n```\n{\n    \"headers\":[\n        {\n            \"content\"\
