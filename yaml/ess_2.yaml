    post:
      description: 此接口（DescribeIntegrationDepartments）用于查询企业的部门信息列表，支持查询单个部门节点或单个部门节点及一级子节点部门列表。
      operationId: DescribeIntegrationDepartments
      parameters:
      - in: body
        schema:
          $ref: '#/body_definitions/DescribeIntegrationDepartmentsRequest'
      produces:
      - application/json
      responses:
        '200':
          schema:
            $ref: '#/body_definitions/DescribeIntegrationDepartmentsResponse'
      x-tcapi-action-label: []
      x-tcapi-action-name: 获取企业部门信息列表
      x-tcapi-cam-condition: ''
      x-tcapi-cam-resource: '*'
      x-tcapi-category: 机构与组织相关接口
      x-tcapi-cli-visibility: 1
      x-tcapi-doc-weight: 8858
      x-tcapi-errorcodes:
      - FailedOperation
      - OperationDenied
      - InvalidParameter.ParamError
      - InvalidParameter.DataNotFound
      x-tcapi-examples:
      - description: '适用于需要查询指定部门信息，且不需要子部门信息的场景。

          1. 设置查询类型QueryType为0表示查询单个部门节点；

          2. 设置DeptId表示通过部门ID查询相关部门信息。'
        input: "POST / HTTP/1.1\nHost: ess.tencentcloudapi.com\nContent-Type: application/json\n\
          X-TC-Action: DescribeIntegrationDepartments\n<公共请求参数>\n\n{\n    \"Operator\"\
          : {\n        \"UserId\": \"yDwgKUUcX******XQZDRuD\"\n    },\n    \"QueryType\"\
          : 0,\n    \"DeptId\":  \"yDwgIUUckp1g******E8xOm12b9\"\n}"
        output: "{\n  \"Response\": {\n    \"Departments\": [\n      {\n        \"\
          DeptId\": \"yDwgIUUckp1g*****E8xOm12b9\",\n        \"DeptName\": \"测试企业\"\
          ,\n        \"DeptOpenId\": \"open_dept1\",\n        \"OrderNo\": 2,\n  \
          \      \"ParentDeptId\": \"yDwgIUUckp1g******E8xOm1221\"\n      }\n    ],\n\
          \    \"RequestId\": \"s168603******44722\"\n  }\n}"
        title: 查询单个部门信息
      - description: '适用于需要查询指定部门及其一级子部门信息的场景。

          1. 设置查询类型QueryType为1表示查询部门节点及一级子部门节点；

          2. 设置DeptId表示通过部门ID查询相关部门信息。'
        input: "POST / HTTP/1.1\nHost: ess.tencentcloudapi.com\nContent-Type: application/json\n\
          X-TC-Action: DescribeIntegrationDepartments\n<公共请求参数>\n\n{\n    \"Operator\"\
          : {\n        \"UserId\": \"yDwgKUUc********QZDRuD\"\n    },\n    \"QueryType\"\
          : 1,\n    \"DeptId\":  \"yDwgIUUckp1g******E8xOm12b9\"\n}"
        output: "{\n  \"Response\": {\n    \"Departments\": [\n      {\n        \"\
          DeptId\": \"yDwgIUUckp1g********E8xOm12b9\",\n        \"DeptName\": \"测试企业\"\
          ,\n        \"DeptOpenId\": \"open_dept1\",\n        \"OrderNo\": 2,\n  \
          \      \"ParentDeptId\": \"yDwgIUUckp1g********E8xOm1221\"\n      },\n \
          \     {\n        \"DeptId\": \"yDwgIUUckp1g********E8xOm5679\",\n      \
          \  \"DeptName\": \"子部门 1\",\n        \"DeptOpenId\": \"open_dept_12\",\n\
          \        \"OrderNo\": 3,\n        \"ParentDeptId\": \"yDwgIUUckp1g*******E8xOm12b9\"\
          \n      },\n      {\n        \"DeptId\": \"yDwgIU2331g********E8xOm12n9\"\
          ,\n        \"DeptName\": \"测试部门 2\",\n        \"DeptOpenId\": \"open_dept_13\"\
          ,\n        \"OrderNo\": 2,\n        \"ParentDeptId\": \"yDwgIUUckp1g********E8xOm12b9\"\
          \n      }\n    ],\n    \"RequestId\": \"s168603******44722\"\n  }\n}"
        title: 查询当前部门和一级子部门信息
      - description: 适用于调用方已获取客户系统部门ID的场景。通过设置DeptOpenId参数查询部门信息。
        input: "POST / HTTP/1.1\nHost: ess.tencentcloudapi.com\nContent-Type: application/json\n\
          X-TC-Action: DescribeIntegrationDepartments\n<公共请求参数>\n\n{\n    \"Operator\"\
          : {\n        \"UserId\": \"yDwgKUUcX******XQZDRuD\"\n    },\n    \"QueryType\"\
          : 0,\n    \"DeptOpenId\":  \"open_dept1\"\n}"
        output: "{\n  \"Response\": {\n    \"Departments\": [\n      {\n        \"\
          DeptId\": \"yDwgIUUckp1g*****E8xOm12b9\",\n        \"DeptName\": \"测试企业\"\
          ,\n        \"DeptOpenId\": \"open_dept1\",\n        \"OrderNo\": 2,\n  \
          \      \"ParentDeptId\": \"yDwgIUUckp1g******E8xOm1221\"\n      }\n    ],\n\
          \    \"RequestId\": \"s168603******44722\"\n  }\n}"
        title: 查询部门信息（根据客户系统部门ID）
      - description: 当调用方同时设置了部门DeptId和客户系统部门DeptOpenId时，系统优先使用DeptId查询部门信息，DeptOpenId不生效。
        input: "POST / HTTP/1.1\nHost: ess.tencentcloudapi.com\nContent-Type: application/json\n\
          X-TC-Action: DescribeIntegrationDepartments\n<公共请求参数>\n\n{\n    \"Operator\"\
          : {\n        \"UserId\": \"yDwgKUUcX******XQZDRuD\"\n    },\n    \"QueryType\"\
          : 0,\n    \"DeptId\": \"yDwgIUUckp1g*****E8xOm12b9\",\n    \"DeptOpenId\"\
          :  \"open_dept2\"\n}"
        output: "{\n  \"Response\": {\n    \"Departments\": [\n      {\n        \"\
          DeptId\": \"yDwgIUUckp1g*****E8xOm12b9\",\n        \"DeptName\": \"测试企业\"\
          ,\n        \"DeptOpenId\": \"open_dept1\",\n        \"OrderNo\": 2,\n  \
          \      \"ParentDeptId\": \"yDwgIUUckp1g******E8xOm1221\"\n      }\n    ],\n\
          \    \"RequestId\": \"s168603******44722\"\n  }\n}"
        title: 查询部门信息（系统优先使用部门ID查询）
      - description: 当部门DeptId和客户系统部门DeptOpenId都未设置时，系统默认返回根部门节点信息。
        input: "POST / HTTP/1.1\nHost: ess.tencentcloudapi.com\nContent-Type: application/json\n\
          X-TC-Action: DescribeIntegrationDepartments\n<公共请求参数>\n\n{\n    \"Operator\"\
          : {\n        \"UserId\": \"yDwgKUUcX******XQZDRuD\"\n    },\n    \"QueryType\"\
          : 0\n}"
        output: "{\n  \"Response\": {\n    \"Departments\": [\n      {\n        \"\
          DeptId\": \"yDwgIUUckp1g*****E8xOm12b9\",\n        \"DeptName\": \"测试企业\"\
          ,\n        \"DeptOpenId\": \"open_dept1\",\n        \"OrderNo\": 0,\n  \
          \      \"ParentDeptId\": \"0\"\n      }\n    ],\n    \"RequestId\": \"s168603******44722\"\
          \n  }\n}"
        title: 查询部门信息（系统默认返回根部门节点信息）
      - description: 设置了非法的部门查询类型QueryType，查询失败。
        input: "POST / HTTP/1.1\nHost: ess.tencentcloudapi.com\nContent-Type: application/json\n\
          X-TC-Action: DescribeIntegrationDepartments\n<公共请求参数>\n\n{\n    \"Operator\"\
          : {\n        \"UserId\": \"yDwgKUUcX******XQZDRuD\"\n    },\n    \"QueryType\"\
