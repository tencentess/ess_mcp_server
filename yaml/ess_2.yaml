  /UpdateIntegrationEmployees:
    post:
      description: '此接口（UpdateIntegrationEmployees）<font color="red"><b>用于修改未实名企业员工信息(姓名，手机号，邮件、部门)</b></font>。

        如果企业员工已经实名， 姓名，手机号，邮件等需要企业员工到小程序或者控制台自己修改， 部门则需要超管到控制台分配


        修改手机号的时候,支持以下场景进行提醒通知

        <table>

        <tbody>

        <tr>

        <td>生成端</td>

        <td >入参</td>

        <td>提醒方式</td>

        </tr>

        <tr>

        <td>普通saas员工</td>

        <td>将Employees中的DisplayName设置员工的名字，Mobile设置成员工的手机号</td>

        <td>发送短信通知员工（短信中带有认证加入企业的链接）</td>

        </tr>

        <tr>

        <td>企微员工</td>

        <td>将Employees 中的WeworkOpenId字段设置为企微员工明文的openid，需<font color="red">确保该企微员工在应用的可见范围内</font></td>

        <td>企微内部实名消息</td>

        </tr>

        <tr>

        <td>H5端 saas员工</td>

        <td>传递 InvitationNotifyType = H5，将Employees中的DisplayName设置员工的名字，Mobile设置成员工的手机号，<font
        color="red">此场景不支持企微</font></td>

        <td>生成认证加入企业的H5链接，贵方可以通过自己的渠道触达到此员工</td>

        </tr>

        </tbody>

        </table>

        注意：


        - <b>若通过手机号发现员工已经创建，则不会重复创建，但会发送短信或者生成链接提醒员工实名。</b>

        - jumpUrl 仅支持H5的邀请方式，回跳的url，使用前请联系对接的客户经理沟通，进行域名的配置。'
      operationId: UpdateIntegrationEmployees
      parameters:
      - in: body
        schema:
          $ref: '#/body_definitions/UpdateIntegrationEmployeesRequest'
      produces:
      - application/json
      responses:
        '200':
          schema:
            $ref: '#/body_definitions/UpdateIntegrationEmployeesResponse'
      x-tcapi-action-label: []
      x-tcapi-action-name: 更新企业员工信息
      x-tcapi-cam-condition: ''
      x-tcapi-cam-resource: '*'
