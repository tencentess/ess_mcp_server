  /CreateOrganizationInfoChangeUrl:
    post:
      description: "此接口（CreateOrganizationInfoChangeUrl）用于创建企业信息变更链接，支持创建企业超管变更链接或企业基础信息变更链接，通过入参ChangeType指定。\n\
        \n 需要企业的<font color=\"red\">现有的超级管理员、法人来点击</font>链接执行变动操作。\n\n### 2. 企业基础信息\n\
        #### A. 可变动的信息\n- **企业名称**\n- **法定代表人姓名**（新法人将收到邀请链接）\n- **企业地址和所在地**\n- **企业超级管理员变更**\
        \ （此变更将企业超级管理员的职责转移给企业的其他员工）\n\n#### B. 不可变动的信息\n- **统一社会信用代码**\n- **企业主体类型**\n\
        \n### 3.变更影响\n\n如果企业的名字变更将导致下面的影响：\n\n- **合同**：已存在的合同将保持不变。新发起的合同需使用新的企业名称作为签署方，否则无法签署。\n\
        - **印章**：所有现有的机构公章和合同专用章将被删除，并将根据新的企业名称重新生成。法人章、财务专用章和人事专用章将不做处理。\n- **证书**：企业证书将重新由CA机构使用新的企业名称生成。"
      operationId: CreateOrganizationInfoChangeUrl
      parameters:
      - in: body
        schema:
          $ref: '#/body_definitions/CreateOrganizationInfoChangeUrlRequest'
      produces:
