          e01a9584-4b91-45dd-9a7b-46d32c4099fd\"\n  }\n}"
        title: H5端添加企业员工
      - description: 创建企微企业员工，只需传入WeworkOpenId参数即可。
        input: "POST / HTTP/1.1\nHost: ess.tencentcloudapi.com\nContent-Type: application/json\n\
          X-TC-Action: CreateIntegrationEmployees\n<公共请求参数>\n\n{\n\t\"Operator\":\
          \ {\n\t\t\"UserId\": \"yDwf3UUckps8dvypUEfH3DjwIpMfa0uw\"\n\t},\n\t\"Employees\"\
          : [{\n\t\t\"WeworkOpenId\": \"woed0SCQAAAtPx1SMU17ThB-QC7F\"\n\t}]\n}"
        output: "{\n  \"Response\": {\n    \"CreateEmployeeResult\": {\n      \"FailedEmployeeData\"\
          : [],\n      \"SuccessEmployeeData\": [\n        {\n          \"DisplayName\"\
          : \"\",\n          \"Mobile\": \"\",\n          \"Note\": \"\",\n      \
          \    \"UserId\": \"yDxVwUyKQWho8CUuO4zjEyQOAgwvr4Zy\",\n          \"WeworkOpenId\"\
          : \"woed0SCQAAAtPx1SMU17ThB-QC7F\"\n        }\n      ]\n    },\n    \"RequestId\"\
          : \"s1695125479063466836\"\n  }\n}"
        title: 创建员工-企微员工
      - description: 创建非企微企业的员工，传入必填参数即可。
        input: "POST / HTTP/1.1\nHost: ess.tencentcloudapi.com\nContent-Type: application/json\n\
          X-TC-Action: CreateIntegrationEmployees\n<公共请求参数>\n\n{\n\t\"Operator\":\
          \ {\n\t\t\"UserId\": \"yyDxVwUyKQWho8CUuO4zjEyQOAgwvr4ZyN\"\n\t},\n\t\"\
