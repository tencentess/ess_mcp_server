  /DeleteOrganizationAuthorizations:
    post:
      description: '批量清理未认证的企业认证流程。


        此接口用来清除企业方认证信息填写错误，批量清理认证中的认证流信息。

        为接口[创建企业批量认证链接](https://qian.tencent.com/developers/companyApis/organizations/CreateBatchOrganizationRegistrationTasks)
        和[查询企业批量认证链接](https://qian.tencent.com/developers/companyApis/organizations/DescribeBatchOrganizationRegistrationUrls)
        接口的扩展接口。即在批量认证过程中，当发起认证企业发现超管信息错误的时候，可以将当前超管下的所有认证流企业清除。


        注意：

        **这个接口的操作人必须跟生成批量认证链接接口的操作人一致，才可以调用，否则会返回当前操作人没有认证中的企业认证流**'
      operationId: DeleteOrganizationAuthorizations
