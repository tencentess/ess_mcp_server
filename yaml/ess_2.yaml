      - RequestSource
      - Timestamp
      - Action
      x-tcapi-system-param-detail:
        Action: all
        ApiModule: all
        AppId: body
        ClientIp: all
        Language: header
        Region: header
        RequestClient: header
        RequestId: all
        RequestSource: all
        SubAccountUin: body
        Timestamp: header
        Token: header
        TraceId: header
