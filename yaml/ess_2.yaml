info:
  title: tcapi export file.
  version: '2020-11-11'
paths:
  /ArchiveDynamicFlow:
    post:
      description: '该接口用于结束动态签署方2.0的合同流程。



        **功能开通**

        - 动态签署方2.0功能的使用需要先<font color="red">联系产品经理开通模块化计费功能</font>，然后到控制台中打开此功能。详细的使用说明请参考<a
        href="https://qian.tencent.com/developers/company/dynamic_signer_v2" target="_blank">动态签署方2.0</a>文档。


        **使用条件**

        - 此接口只能在<font color="red">合同处于非终态且<b>所有的签署方都已经完成签署</b></font>。一旦合同进入终态（例如：过期、拒签、撤销或者调用过此接口成功过），将无法通过此接口结束合同流程。


        **整体流程**

        ![image](https://qcloudimg.tencent-cloud.cn/raw/75d323c66e44b05bbc8e949c18664455.png)'
      operationId: ArchiveDynamicFlow
      parameters:
      - in: body
        schema:
          $ref: '#/body_definitions/ArchiveDynamicFlowRequest'
      produces:
      - application/json
      responses:
        '200':
          schema:
            $ref: '#/body_definitions/ArchiveDynamicFlowResponse'
      x-tcapi-action-label: []
      x-tcapi-action-name: 结束动态签署流程
      x-tcapi-cam-condition: ''
      x-tcapi-cam-resource: '*'
      x-tcapi-category: 控制签署流程相关接口
      x-tcapi-cli-visibility: 1
      x-tcapi-doc-weight: 8963
      x-tcapi-errorcodes:
      - InternalError
      - ResourceUnavailable
      - FailedOperation
      - OperationDenied
      - InvalidParameter.ParamError
      - InternalError.System
      - OperationDenied.Forbid
      - ResourceNotFound.NotExistFlow
      - OperationDenied.NoIdentityVerify
      - ResourceNotFound.Flow
      - InvalidParameter.Status
      - OperationDenied.WhiteListForbid
      - OperationDenied.FlowHasTerminated
      - MissingParameter.CancelReason
      - InvalidParameter.CancelReason
      - UnauthorizedOperation.NoPermissionFeature
      x-tcapi-examples:
      - description: 所有签署方签署完成后，结束动态合同
        input: "POST / HTTP/1.1\nHost: ess.tencentcloudapi.com\nContent-Type: application/json\n\
          X-TC-Action: ArchiveDynamicFlow\n<公共请求参数>\n\n{\n\t\"Operator\": {\n\t\t\"\
          UserId\": \"yDwf3UUckps8dvveUEfH3DjvMmg3ZkjQ\"\n\t},\n\t\"FlowId\": \"yDCjFUUckp48fiwyUyh7ukYEdXdSyJps\"\
          \n}"
        output: "{\n\t\"Response\": {\n\t\t\"Approvers\": [\n\t\t\t{\n\t\t\t\t\"RecipientId\"\
          : \"yDCjFUUckp48fiwbUyh7ukYE1kRDNNN4\",\n\t\t\t\t\"SignId\": \"yDCjFUUckp48fiwwUyh7ukYvjx5PR1e2\"\
          \n\t\t\t}\n\t\t],\n\t\t\"FlowId\": \"yDCjFUUckp48fiwyUyh7ukYEdXdSyJps\"\
          ,\n\t\t\"RequestId\": \"ca0fd107-4337-4650-8236-aa3e4561f7ef\"\n\t}\n}"
        title: 归档合同
      - description: 未签署完成前归档
        input: "POST / HTTP/1.1\nHost: ess.tencentcloudapi.com\nContent-Type: application/json\n\
          X-TC-Action: ArchiveDynamicFlow\n<公共请求参数>\n\n{\n\t\"Operator\": {\n\t\t\"\
          UserId\": \"yDwf3UUckps8dvveUEfH3DjvMmg3ZkjQ\"\n\t},\n\t\"FlowId\": \"yDCjFUUckp4jkz76UoofpTx3iZ3A3C3x\"\
          \n}"
        output: "{\n\t\"Response\": {\n\t\t\"Error\": {\n\t\t\t\"Code\": \"OperationDenied\"\
          ,\n\t\t\t\"Message\": \"当前合同状态不支持归档合同,请检查后重试\"\n\t\t},\n\t\t\"RequestId\"\
          : \"34ded0a6-e679-4af7-a07e-ca457e388499\"\n\t}\n}"
        title: 归档失败
      - description: 所有签署方都签署完成，并且不再新增签署方时，结束该动态签署合同
        input: "POST / HTTP/1.1\nHost: ess.tencentcloudapi.com\nContent-Type: application/json\n\
          X-TC-Action: ArchiveDynamicFlow\n<公共请求参数>\n\n{\n  \"Operator\": {\n    \"\
          ClientIp\": \"1.1.1.1\",\n    \"UserId\": \"yDxZtUyKQD2JuqUuO4zjERYGxxxxxxxx\"\
          \n  },\n  \"FlowId\": \"yDCmVUUckpufezuiUxQQFiT8Exxxxxxxx\"\n}"
        output: "{\n  \"Response\": {\n    \"Approvers\": [\n      {\n        \"SignId\"\
          : \"yDCmDUUckpuf0hsfUuvalvQtaxxxxxxx\",\n        \"RecipientId\": \"yDCmDUUckpuf0hseUuvalvQRmxxxxxx\"\
          \n      }\n    ],\n    \"FlowId\": \"yDCmDUUckpuf0hsmUuvalvQyxxxxxxxxx\"\
          ,\n    \"RequestId\": \"abc\"\n  }\n}"
        title: 结束动态签署合同
      x-tcapi-is-auth: 1
      x-tcapi-is-internal-service: 0
      x-tcapi-is-sensitive-action: true
      x-tcapi-is-support-idempotence: false
      x-tcapi-rate-lev: null
      x-tcapi-request-size: 10240
      x-tcapi-sec-rate: 20
      x-tcapi-system-param:
