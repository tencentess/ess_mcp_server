        Version: header
      x-tcapi-timeout: 5000
      x-tcapi-url-name: online_电子签网关
      x-tcapi-whole-process-token: 0
  /CancelMultiFlowSignQRCode:
    post:
      description: '此接口（CancelMultiFlowSignQRCode）用于废除一码多签签署码。

        该接口所需的二维码ID，源自[创建一码多签签署码](https://qian.tencent.com/developers/companyApis/startFlows/CreateMultiFlowSignQRCode)生成的。

        如果该签署码尚处于有效期内，可通过本接口将其设置为失效状态。'
      operationId: CancelMultiFlowSignQRCode
      parameters:
      - in: body
        schema:
          $ref: '#/body_definitions/CancelMultiFlowSignQRCodeRequest'
      produces:
      - application/json
      responses:
        '200':
          schema:
            $ref: '#/body_definitions/CancelMultiFlowSignQRCodeResponse'
      x-tcapi-action-label: []
      x-tcapi-action-name: 取消一码多签签署码
      x-tcapi-cam-condition: ''
      x-tcapi-cam-resource: '*'
      x-tcapi-category: 控制签署流程相关接口
      x-tcapi-cli-visibility: 1
      x-tcapi-doc-weight: 8959
      x-tcapi-errorcodes:
