  /ModifyFlowDeadline:
    post:
      description: '在已启动的签署流程中，可对签署截止日期进行延期操作，主要分为以下两个层面：

        1. <b> 合同（流程）层面</b>：仅需提供签署流程ID。此操作将对整个签署流程以及未单独设置签署截止时间的签署人进行延期。

        2. <b> 签署人层面</b>  ：需提供流程ID和签署人ID。此操作针对特定签署人进行延期，特别是对于有序合同（流程），签署截止时间不得超过后续签署人的流程截止时间。


        此接口存在以下限制：

        1. 执行操作的员工须为<font  color="red">发起方企业的超级管理员、法定代表人或签署流程发起人</font>。

        2. 延长整个签署流程时，<font  color="red">应至少有一方尚未签署</font>（即签署流程不能处于已全部签署完成、已拒签、已过期、已撤回、拒绝填写、已解除等状态）。

        3. 延长整个签署流程时，新的签署截止日期应晚于已设定的签署截止日期和当前日期。

        4. 延长签署方截止时间时，<font  color="red">签署方不能处于流程完结或已终止状态</font>（即签署人不能处于已签署、已拒签、已过期、已撤回、拒绝填写、已解除等状态）。

        5. 延长签署方截止时间时，新的签署截止日期应晚于当前日期和已设定的截止日期。若为有序合同，还需早于或等于下一签署人的截止日期，且早于签署流程整体的截止日期。

        6. <font  color="red">不支持操作合同组合同</font>。


        合同（流程）层面 截止时间控制台展示的位置：

        ![image](https://qcloudimg.tencent-cloud.cn/raw/265b130136bf6e8f01f5880438467dfb.png)'
      operationId: ModifyFlowDeadline
      parameters:
      - in: body
        schema:
          $ref: '#/body_definitions/ModifyFlowDeadlineRequest'
      produces:
      - application/json
      responses:
        '200':
          schema:
            $ref: '#/body_definitions/ModifyFlowDeadlineResponse'
      x-tcapi-action-label: []
      x-tcapi-action-name: 修改签署流程截止时间
      x-tcapi-cam-condition: ''
      x-tcapi-cam-resource: '*'
      x-tcapi-category: 控制签署流程相关接口
      x-tcapi-cli-visibility: 1
      x-tcapi-doc-weight: 8967
      x-tcapi-errorcodes:
      - ResourceNotFound
      - FailedOperation
      - OperationDenied
      - InvalidParameter.ParamError
      - InternalError.System
      - InternalError.DependsApi
      - InternalError.DependsDb
      - InternalError.Decryption
      - InternalError.Encryption
      - OperationDenied.Forbid
      - OperationDenied.NoIdentityVerify
      - InternalError.Db
      - OperationDenied.NoLogin
      - OperationDenied.NoQuota
      - InternalError.DbRead
      - FailedOperation.AgeNotAchieveNormalLegal
      - FailedOperation.OrganizationNameChanged
      - FailedOperation.OrganizationNameNeedChange
      - FailedOperation.OrganizationExperienceChange
      - UnauthorizedOperation.NoPermissionFeature
      - FailedOperation.NotAvailableSignReview
      x-tcapi-examples:
      - description: '1.合同发起时设置合同截止时间为1704988032，该合同有3个签署人A，B，C

          2.合同发起时A签署人设置签署截止时间为1704978032，B，C签署人未单独设置签署人截止时间（默认和合同保持一致）

          3.通过接口对整个合同延期后，A签署人截止时间不变（还是1704978032），B，C签署人的签署截止时间和合同截止时间延期为1705977064'
        input: "POST / HTTP/1.1\nHost: ess.tencentcloudapi.com\nContent-Type: application/json\n\
          X-TC-Action: ModifyFlowDeadline\n<公共请求参数>\n\n{\n  \"Operator\": {\n    \"\
          UserId\": \"yDRt2UUgygqxyp7yUuO5zjEwqXwsIljA\"\n  },\n  \"FlowId\": \"yDCNtUUckpvrcvf4UELZnZDvMStFgT7K\"\
          ,\n  \"Deadline\": 1705977064\n}"
        output: "{\n  \"Response\": {\n    \"RequestId\": \"s1705924585583461781\"\
          \n  }\n}"
        title: 延期整个合同-合同发起时有签署人单独设置了签署截止时间
      - description: '1.合同发起时设置合同截止时间为1704988032，该合同有3个签署人A，B，C

          2.合同发起时并未为签署人未单独设置签署人截止时间（默认和合同保持一致）

          3.通过接口对整个合同延期后，A，B，C签署人的签署截止时间和合同截止时间延期为1705977064'
