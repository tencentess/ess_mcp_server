  /DeleteIntegrationEmployees:
    post:
      description: '该接口（DeleteIntegrationEmployees）用于离职本企业员工，同时可选择是否进行离职交接。



        - 如果该员工没有未处理的合同，可不设置交接人的ReceiveUserId或ReceiveOpenId进行离职操作。

        - 如果该员工有未处理的合同，需要设置ReceiveUserId或ReceiveOpenId表示交接的负责人，交接后员工会进行离职操作。


        未处理的合同包括以下：


        - 待签署的合同（包括顺序签署还没有轮到的合同，此类合同某些情况可能不会出现在用户的列表中）。

        - 待填写的合同。

        - 待解除的合同等。


        注：

        1. <font color="red">超管或法人身份的员工不能被离职</font>， 需要在控制台或小程序更换法人和超管后进行离职删除。

        2. <font color="red">员工存在待处理合同时必须交接</font>后才能离职无人交接时不能被离职删除。

        3. 未实名的员工可以直接离职，不用交接合同'
      operationId: DeleteIntegrationEmployees
      parameters:
      - in: body
        schema:
          $ref: '#/body_definitions/DeleteIntegrationEmployeesRequest'
      produces:
      - application/json
      responses:
        '200':
          schema:
            $ref: '#/body_definitions/DeleteIntegrationEmployeesResponse'
      x-tcapi-action-label: []
      x-tcapi-action-name: 离职企业员工
      x-tcapi-cam-condition: ''
      x-tcapi-cam-resource: '*'
