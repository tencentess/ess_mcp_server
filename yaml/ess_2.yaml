        example: 无
        nullable: false
        type: string
        x-tcapi-reference: []
        x-tcapi-visibility: 1
      CertInfoCallback:
        description: '是否回调证书信息:

          <ul><li>**false**: 不需要(默认)</li>

          <li>**true**:需要</li></ul>


          注：`该字段已经失效，请勿设置此参数。`'
        disabled: false
        example: 'false'
        format: bool
        nullable: false
        type: boolean
        x-tcapi-reference: []
        x-tcapi-visibility: 1
      JumpUrl:
        description: '开通成功后前端页面跳转的url，此字段的用法场景请联系客户经理确认。


          注：`仅支持H5开通场景`, `跳转链接仅支持 https:// , qianapp:// 开头`


          跳转场景：

          <ul><li>**贵方H5 -> 腾讯电子签H5 -> 贵方H5** : JumpUrl格式: https://YOUR_CUSTOM_URL/xxxx，只需满足
          https:// 开头的正确且合规的网址即可。</li>

          <li>**贵方原生App -> 腾讯电子签H5 -> 贵方原生App** : JumpUrl格式: qianapp://YOUR_CUSTOM_URL，只需满足
          qianapp:// 开头的URL即可。`APP实现方，需要拦截Webview地址跳转，发现url是qianapp:// 开头时跳转到原生页面。`APP拦截地址跳转可参考：<a
          href=''https://stackoverflow.com/questions/41693263/android-webview-err-unknown-url-scheme''>Android</a>，<a
          href=''https://razorpay.com/docs/payments/payment-gateway/web-integration/standard/webview/upi-intent-ios/''>IOS</a>
          </li></ul>


          成功结果返回：

          若贵方需要在跳转回时通过链接query参数提示开通成功，JumpUrl中的query应携带如下参数：`appendResult=qian`。这样腾讯电子签H5会在跳转回的url后面会添加query参数提示贵方签署成功，例如：
          qianapp://YOUR_CUSTOM_URL?action=sign&result=success&from=tencent_ess'
        disabled: false
        example: https://jump.cn/jump
        nullable: false
        type: string
        x-tcapi-reference: []
        x-tcapi-visibility: 1
      LicenseType:
        description: '设置用户自动签合同的扣费方式。


          <ul><li><b>1</b>: (默认)使用合同份额进行扣减</li></ul>


          注：`该字段已经失效，请勿设置此参数。`'
        disabled: false
