  /CreateIntegrationEmployees:
    post:
      description: '此接口（CreateIntegrationEmployees）用于创建企业员工。创建的员工初始化为未实名，如下图所示。


        ![image](https://qcloudimg.tencent-cloud.cn/raw/2bdcc0d91ac3146b5e8c28811a78ffe9.png)


        支持以下场景

        <table>

        <tbody>

        <tr>

        <td>生成端</td>

        <td >入参</td>

        <td>提醒方式</td>

        </tr>

        <tr>

        <td>普通saas员工</td>

        <td>将Employees中的DisplayName设置员工的名字，Mobile设置成员工的手机号</td>

        <td>发送短信通知员工（短信中带有认证加入企业的链接）  </td>

        </tr>

        <tr>

        <td>企微员工</td>

        <td>将Employees 中的WeworkOpenId字段设置为企微员工明文的openid，需<font color="red">确保该企微员工在应用的可见范围内</font></td>

        <td>企微内部实名消息</td>

        </tr>

        <tr>

        <td>H5端 saas员工</td>

        <td>传递 InvitationNotifyType = H5，将Employees中的DisplayName设置员工的名字，Mobile设置成员工的手机号，<font
        color="red">此场景不支持企微</font></td>

        <td>生成认证加入企业的H5链接，贵方可以通过自己的渠道触达到此员工</td>

        </tr>

        </tbody>

        </table>

        注意：


        -  <b> 新增员工的手机号、OpenId不能与已加入员工重复</b>， 不管已加入员工的手机号、OpenId是否已经实名

        - <b>若通过手机号发现员工已经创建且信息一致（名字，openId等），则不会重复创建，但会发送短信或者生成链接提醒员工实名。</b>

        - jumpUrl 仅支持H5的邀请方式，回跳的url，使用前请联系对接的客户经理沟通，进行域名的配置。




        短信的样式


        ![image](https://qcloudimg.tencent-cloud.cn/raw/b6ad1b79e0adaaa41d282456c72a1ee6.png)'
      operationId: CreateIntegrationEmployees
      parameters:
      - in: body
        schema:
          $ref: '#/body_definitions/CreateIntegrationEmployeesRequest'
      produces:
      - application/json
      responses:
        '200':
          schema:
            $ref: '#/body_definitions/CreateIntegrationEmployeesResponse'
      x-tcapi-action-label: []
      x-tcapi-action-name: 创建企业员工
      x-tcapi-cam-condition: ''
      x-tcapi-cam-resource: '*'
      x-tcapi-category: 机构与员工相关接口
      x-tcapi-cli-visibility: 1
      x-tcapi-doc-weight: 8823
      x-tcapi-errorcodes:
      - InvalidParameter
      - MissingParameter
      - UnauthorizedOperation
      - FailedOperation
      - InternalError.System
      - OperationDenied.Forbid
      - InvalidParameter.InvalidOperatorId
      - InvalidParameter.InvalidOrganizationId
      - InvalidParameter.InvalidChannel
      - OperationDenied.NoIdentityVerify
      - UnauthorizedOperation.NoPermissionFeature
      x-tcapi-examples:
      - description: 企业员工未认证， 在H5端， 用户通过生成链接嵌入到小程序，进行加入，实名
        input: "POST / HTTP/1.1\nHost: ess.tencentcloudapi.com\nContent-Type: application/json\n\
          X-TC-Action: CreateIntegrationEmployees\n<公共请求参数>\n\n{\n\t\"Operator\":\
          \ {\n\t\t\"UserId\": \"yDwf3UUckps8dvypUEfH3DjwIpMfa0uw\"\n\t},\n\t\"Employees\"\
          : [\n\t\t{\n\t\t\t\"DisplayName\": \"典子谦\",\n\t\t\t\"Mobile\": \"13200000000\"\
          ,\n\t\t\t\"OpenId\": \"n9527\"\n\t\t}\n\t],\n\t\"InvitationNotifyType\"\
          : \"H5\",\n\t\"JumpUrl\": \"https://www.qq.com\"\n}"
        output: "{\n  \"Response\": {\n    \"CreateEmployeeResult\": {\n      \"FailedEmployeeData\"\
          : [],\n      \"SuccessEmployeeData\": [\n        {\n          \"DisplayName\"\
          : \"典子谦\",\n          \"Mobile\": \"13200000000\",\n          \"Note\":\
          \ \"\",\n          \"UserId\": \"yDCNCUUckpv0ox66UC7yFOvFzax82lgp\",\n \
          \         \"Url\": \"https://test.essurl.cn/TxHxUBCx0G\",\n          \"\
