    description: 自动签开启、签署相关配置
    properties:
      CallbackUrl:
        description: '执行结果的回调URL，该URL仅支持HTTP或HTTPS协议，建议采用HTTPS协议以保证数据传输的安全性。

          腾讯电子签服务器将通过POST方式，application/json格式通知执行结果，请确保外网可以正常访问该URL。

          回调的相关说明可参考开发者中心的<a href="https://qian.tencent.com/developers/company/callback_types_v2"
          target="_blank">回调通知</a>模块。'
