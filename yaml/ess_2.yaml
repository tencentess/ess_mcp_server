        output: "{\n  \"Response\": {\n    \"Error\": {\n      \"Code\": \"InvalidParameter.ParamError\"\
          ,\n      \"Message\": \"部门查询类型不存在，请核对参数\"\n    },\n    \"RequestId\": \"\
          s168603******44722\"\n  }\n}"
