body_definitions:
  ArchiveDynamicFlowRequest:
    properties:
      Agent:
        $ref: '#/definitions/Agent'
        description: '代理企业和员工的信息。

          在集团企业代理子企业操作的场景中，需设置此参数。在此情境下，ProxyOrganizationId（子企业的组织ID）为必填项。'
        disabled: false
        example: 无
        x-tcapi-reference: []
        x-tcapi-visibility: 1
      FlowId:
        description: '合同流程ID, 为32位字符串。


          可登录腾讯电子签控制台，[点击查看FlowId在控制台中的位置](https://qcloudimg.tencent-cloud.cn/raw/0a83015166cfe1cb043d14f9ec4bd75e.png)'
        disabled: false
        example: yDwFmUUckpstqfvzUE1h3jo1f3cqjkGm
        type: string
        x-tcapi-reference: []
        x-tcapi-visibility: 1
      Operator:
        $ref: '#/definitions/UserInfo'
        description: '执行本接口操作的员工信息。

          注: `在调用此接口时，请确保指定的员工已获得所需的接口调用权限，并具备接口传入的相应资源的数据权限。`'
        disabled: false
        example: 无
        x-tcapi-reference: []
        x-tcapi-visibility: 1
    required:
    - Operator
    - FlowId
    type: object
  ArchiveDynamicFlowResponse:
    properties:
      Approvers:
        description: 动态签署人的参与人信息
        disabled: false
        example: 无
        items:
          $ref: '#/definitions/ArchiveDynamicApproverData'
        nullable: false
        type: array
        x-tcapi-reference: []
        x-tcapi-visibility: 1
      FlowId:
        description: 合同流程ID
        disabled: false
        example: yDwFmUUckpstqfvzUE1h3jo1f3cqjkGm
        nullable: false
        type: string
        x-tcapi-reference: []
        x-tcapi-visibility: 1
    type: object
    x-tcapi-output-required: []
  CancelMultiFlowSignQRCodeRequest:
    properties:
      Agent:
        $ref: '#/definitions/Agent'
        description: '代理企业和员工的信息。

          在集团企业代理子企业操作的场景中，需设置此参数。在此情境下，ProxyOrganizationId（子企业的组织ID）为必填项。'
        disabled: false
        example: 无
        x-tcapi-reference: []
        x-tcapi-visibility: 1
      Operator:
        $ref: '#/definitions/UserInfo'
        description: '执行本接口操作的员工信息。

          注: `在调用此接口时，请确保指定的员工已获得所需的接口调用权限，并具备接口传入的相应资源的数据权限。'
        disabled: false
        example: 无
        x-tcapi-reference: []
        x-tcapi-visibility: 1
      QrCodeId:
        description: 需要取消的签署码ID，为32位字符串。由[创建一码多签签署码](https://qian.tencent.com/developers/companyApis/startFlows/CreateMultiFlowSignQRCode/)返回
        disabled: false
        example: yDR***********Apl
        type: string
        x-tcapi-reference: []
        x-tcapi-visibility: 1
    required:
    - Operator
    - QrCodeId
    type: object
  CancelMultiFlowSignQRCodeResponse:
    properties: {}
    type: object
    x-tcapi-output-required: []
  CreateFlowApproversRequest:
    properties:
      Agent:
        $ref: '#/definitions/Agent'
        description: '代理企业和员工的信息。

          在集团企业代理子企业操作的场景中，需设置此参数。在此情境下，ProxyOrganizationId（子企业的组织ID）为必填项。'
        disabled: false
        example: 无
        x-tcapi-reference: []
        x-tcapi-visibility: 1
      Approvers:
        description: '补充签署环节签署候选人信息。


          注：` 如果发起方指定的补充签署人是企业微信签署人（ApproverSource=WEWORKAPP），则需要提供企业微信UserId进行补充；
          如果不指定，则使用姓名和手机号进行补充。`'
        disabled: false
        example: 无
        items:
          $ref: '#/definitions/FillApproverInfo'
        type: array
        x-tcapi-reference: []
        x-tcapi-visibility: 1
      FillApproverType:
        description: '签署人信息补充方式


          <ul><li>**0**: <font color="red">或签合同</font>添加签署候选人，或签支持一个节点传多个签署人，不传值默认或签。

          注: `或签只支持企业签署方`</li>

          <li>**1**: <font color="red">动态签署人合同</font>的添加签署候选人，支持企业或个人签署方。</li></ul>'
        disabled: false
        example: '0'
        format: int64
        type: integer
        x-tcapi-reference: []
        x-tcapi-visibility: 1
      FlowGroupId:
        description: 合同流程组的组ID, 在合同流程组场景下，生成合同流程组的签署链接时需要赋值
        disabled: false
        example: yDR1AUUgygjazuesUuO4zjESPW4PkfNi
        type: string
        x-tcapi-reference: []
        x-tcapi-visibility: 1
      FlowId:
        description: '合同流程ID，为32位字符串。

          - 建议开发者妥善保存此流程ID，以便于顺利进行后续操作。

          - 可登录腾讯电子签控制台，在 "合同"->"合同中心" 中查看某个合同的FlowId(在页面中展示为合同ID)。

          - <font color="red">不建议继续使用</font>，请使用<a href="https://qian.tencent.com/developers/companyApis/dataTypes/#fillapproverinfo/"
          target="_blank">补充签署人结构体</a>中的FlowId来指定需要补充的合同id'
        disabled: false
        example: yDtwLUUckp79ltk3UETpdnTykAcZdrFZ
        type: string
        x-tcapi-reference: []
        x-tcapi-visibility: 1
      Initiator:
        description: 在可定制的企业微信通知中，发起人可以根据具体需求进行自定义设置。
        disabled: false
        example: 总部集团
        type: string
        x-tcapi-reference: []
        x-tcapi-visibility: 1
      Operator:
        $ref: '#/definitions/UserInfo'
        description: '执行本接口操作的员工信息。

          注: `在调用此接口时，请确保指定的员工已获得所需的接口调用权限，并具备接口传入的相应资源的数据权限。`'
        disabled: false
        example: 无
        x-tcapi-reference: []
        x-tcapi-visibility: 1
    required:
    - Operator
    - Approvers
    type: object
  CreateFlowApproversResponse:
    properties:
      FillError:
        description: '批量补充签署人时，补充失败的报错说明


          注:`目前仅补充动态签署人时会返回补充失败的原因`'
        disabled: false
        example: 无
        items:
          $ref: '#/definitions/FillError'
        nullable: false
        type: array
        x-tcapi-reference: []
        x-tcapi-visibility: 1
    type: object
    x-tcapi-output-required: []
  CreateFlowGroupSignReviewRequest:
    properties:
      Agent:
        $ref: '#/definitions/Agent'
        description: 代理相关应用信息，如集团主企业代子企业操作的场景中ProxyOrganizationId必填
        disabled: false
        example: 无
        x-tcapi-reference: []
        x-tcapi-visibility: 1
      ApproverInfo:
        $ref: '#/definitions/NeedReviewApproverInfo'
        description: '需要进行签署审核的签署人的个人信息或企业信息，签署方的匹配方式按照以下规则:


          个人：二选一（选择其中任意信息组合即可）

          <ul><li>姓名+证件类型+证件号</li>

          <li>姓名+手机号</li></ul>


          企业：二选一  （选择其中任意信息组合即可）

          <ul><li>企业名+姓名+证件类型+证件号</li>

          <li>企业名+姓名+手机号</li></ul>'
        disabled: false
        example: 无
        x-tcapi-reference: []
        x-tcapi-visibility: 1
      FlowGroupId:
        description: 合同(流程)组的合同组Id，为32位字符串，通过接口[通过多文件创建合同组签署流程](https://qian.tencent.com/developers/companyApis/startFlows/CreateFlowGroupByFiles)
          或[通过多模板创建合同组签署流程](https://qian.tencent.com/developers/companyApis/startFlows/CreateFlowGroupByTemplates)创建合同组签署流程时返回。
        disabled: false
        example: yDSxIUUckpt1ea9hUx5oXYkSgVNJaxOE
        type: string
        x-tcapi-reference: []
        x-tcapi-visibility: 1
      Operator:
        $ref: '#/definitions/UserInfo'
        description: '执行本接口操作的员工信息。

          注: `在调用此接口时，请确保指定的员工已获得所需的接口调用权限，并具备接口传入的相应资源的数据权限。`'
        disabled: false
        example: 无
        x-tcapi-reference: []
        x-tcapi-visibility: 1
      ReviewMessage:
        description: '审核不通过的原因，该字段的字符串长度不超过200个字符。


          注：`当审核类型（ReviewType）为审核拒绝（REJECT）或拒签（SIGN_REJECT）时，审核结果原因字段必须填写`

          '
        disabled: false
        example: 价格写错了
        type: string
        x-tcapi-reference: []
        x-tcapi-visibility: 1
      ReviewType:
        description: '提交的审核结果，审核结果有下面三种情况

          <ul><li><b>PASS</b>: 审核通过，合同流程可以继续执行签署等操作</li>

          <li><b>REJECT</b>: 审核拒绝，合同流程不会变动</li>

          <li><b>SIGN_REJECT</b>:拒签，合同流程直接结束，合同状态变为**合同拒签**</li></ul>'
        disabled: false
        example: PASS
        type: string
        x-tcapi-reference: []
        x-tcapi-visibility: 1
    required:
    - Operator
    - FlowGroupId
    - ReviewType
    - ApproverInfo
    type: object
  CreateFlowGroupSignReviewResponse:
    properties: {}
    type: object
    x-tcapi-output-required: []
  CreateFlowRemindsRequest:
    properties:
      Agent:
        $ref: '#/definitions/Agent'
        description: '代理企业和员工的信息。

          在集团企业代理子企业操作的场景中，需设置此参数。在此情境下，ProxyOrganizationId（子企业的组织ID）为必填项。'
        disabled: false
        example: 无
        x-tcapi-reference: []
        x-tcapi-visibility: 1
      FlowIds:
        description: 需执行催办的签署流程ID数组，最多包含100个。
        disabled: false
        example: '[''yDw*************Gm'',''yDwFmU*******Ot2iQF'']'
        items:
          type: string
        type: array
        x-tcapi-reference: []
        x-tcapi-visibility: 1
      Operator:
        $ref: '#/definitions/UserInfo'
        description: '执行本接口操作的员工信息。

          注: `在调用此接口时，请确保指定的员工已获得所需的接口调用权限，并具备接口传入的相应资源的数据权限。`'
        disabled: false
        example: yDR***************oimj
        x-tcapi-reference: []
        x-tcapi-visibility: 1
    required:
    - Operator
    - FlowIds
    type: object
  CreateFlowRemindsResponse:
    properties:
      RemindFlowRecords:
        description: 合同催办结果的详细信息列表。
        disabled: false
        example: 无
        items:
          $ref: '#/definitions/RemindFlowRecords'
        nullable: false
        type: array
        x-tcapi-reference: []
        x-tcapi-visibility: 1
    type: object
    x-tcapi-output-required:
    - RemindFlowRecords
  CreateIntegrationEmployeesRequest:
    properties:
      Agent:
        $ref: '#/definitions/Agent'
        description: '代理企业和员工的信息。

          在集团企业代理子企业操作的场景中，需设置此参数。在此情境下，ProxyOrganizationId（子企业的组织ID）为必填项。'
        disabled: false
        example: 无
        x-tcapi-reference: []
        x-tcapi-visibility: 1
      Employees:
        description: '待创建员工的信息最多不超过20个。


          **1. 在创建企业微信员工的场景下** :  只需传入下面的参数，其他信息不支持设置。

          <table> <thead> <tr> <th>参数</th> <th>是否必填</th> <th>含义</th> </tr> </thead>
          <tbody> <tr> <td>WeworkOpenId</td> <td>是</td> <td>企业微信用户账号ID</td> </tr>
          </tbody> </table>


          **2. 在其他场景下** :   只需传入下面的参数，其他信息不支持设置。

          <table> <thead> <tr> <th>参数</th> <th>是否必填</th> <th>含义</th> </tr> </thead>
          <tbody> <tr> <td>DisplayName</td> <td>是</td> <td>用户的真实名字</td> </tr> <tr>
          <td>Mobile</td> <td>是</td> <td>用户手机号码</td> </tr> <tr> <td>OpenId</td> <td>否</td>
          <td>用户的自定义ID</td> </tr> <tr> <td>Email</td> <td>否</td> <td>用户的邮箱</td> </tr>
          <tr> <td>Department.DepartmentId</td> <td>否</td> <td>用户加入后的部门ID</td> </tr>
          </tbody> </table>



          注: `每个手机号每天最多使用3次`'
        disabled: false
        example: 无
        items:
          $ref: '#/definitions/Staff'
        type: array
        x-tcapi-reference: []
        x-tcapi-visibility: 1
      Endpoint:
        description: 要跳转的链接类型<ul><li> **HTTP**：跳转电子签小程序的http_url, 短信通知或者H5跳转适合此类型  ，此时返回长链
          (默认类型)</li><li>**HTTP_SHORT_URL**：跳转电子签小程序的http_url, 短信通知或者H5跳转适合此类型，此时返回短链</li><li>**APP**：
          第三方APP或小程序跳转电子签小程序的path,  APP或者小程序跳转适合此类型</li><li>**H5**： 第三方移动端浏览器进行嵌入，不支持小程序嵌入，过期时间一个月</li></ul>注意：InvitationNotifyType
          和 Endpoint 的关系图<table><tbody><tr><td>通知类型（InvitationNotifyType）</td><td>Endpoint</td></tr><tr><td>SMS（默认）</td><td>不需要传递，会将
          Endpoint 默认设置为HTTP_SHORT_URL</td></tr><tr><td>H5</td><td>不需要传递，会将 Endpoint
          默认设置为 H5</td></tr><tr><td>NONE</td><td>所有 Endpoint 都支持（HTTP_URL/HTTP_SHORT_URL/H5/APP）默认为HTTP_SHORT_URL</td></tr></tbody></table>
        disabled: false
        example: APP
        type: string
        x-tcapi-reference: []
        x-tcapi-visibility: 1
      InvitationNotifyType:
        description: '员工邀请方式

          可通过以下途径进行设置：

          <ul><li>**SMS（默认）**：邀请将通过短信或企业微信消息发送。若场景非企业微信，则采用企业微信消息；其他情境下则使用短信通知。短信内含链接，点击后将进入微信小程序进行认证并加入企业的流程。</li><li>**H5**：将生成H5链接，用户点击链接后可进入H5页面进行认证并加入企业的流程。</li><li>**NONE**：系统会根据Endpoint生成签署链接，业务方需获取链接并通知客户。</li></ul>'
        disabled: false
        example: SMS
        type: string
        x-tcapi-reference: []
        x-tcapi-visibility: 1
      JumpUrl:
        description: '回跳地址，为认证成功后页面进行回跳的URL，请确保回跳地址的可用性。


          注：`只有在员工邀请方式（InvitationNotifyType参数）为H5场景下才生效， 其他方式下设置无效。`

          '
        disabled: false
        example: https://www.qq.com/action-next
        type: string
        x-tcapi-reference: []
        x-tcapi-visibility: 1
      Operator:
        $ref: '#/definitions/UserInfo'
        description: '执行本接口操作的员工信息。使用此接口时，必须填写userId。

          注: `在调用此接口时，请确保指定的员工已获得所需的接口调用权限，并具备接口传入的相应资源的数据权限。`'
        disabled: false
        example: 无
        x-tcapi-reference: []
        x-tcapi-visibility: 1
    required:
    - Operator
    - Employees
    type: object
  CreateIntegrationEmployeesResponse:
    properties:
      CreateEmployeeResult:
        $ref: '#/definitions/CreateStaffResult'
        description: 创建员工的结果。包含创建成功的数据与创建失败数据。
        disabled: false
        example: 无
        nullable: false
        x-tcapi-reference: []
        x-tcapi-visibility: 1
    type: object
    x-tcapi-output-required:
    - CreateEmployeeResult
  CreateLegalSealQrCodeRequest:
    properties:
      Agent:
        $ref: '#/definitions/Agent'
        description: '代理企业和员工的信息。

          在集团企业代理子企业操作的场景中，需设置此参数。在此情境下，ProxyOrganizationId（子企业的组织ID）为必填项。'
        disabled: false
        example: 无
        x-tcapi-reference: []
        x-tcapi-visibility: 1
      Operator:
        $ref: '#/definitions/UserInfo'
        description: '执行本接口操作的员工信息。

          注: `在调用此接口时，请确保指定的员工已获得所需的接口调用权限，并具备接口传入的相应资源的数据权限。`'
        disabled: false
        example: 无
        x-tcapi-reference: []
        x-tcapi-visibility: 1
      Organization:
        $ref: '#/definitions/OrganizationInfo'
        description: 机构信息，暂未开放
        disabled: true
        example: 无
        x-tcapi-reference: []
        x-tcapi-visibility: 1
    required: []
    type: object
  CreateLegalSealQrCodeResponse:
    properties:
      QrcodeBase64:
        description: '二维码图片base64值，二维码有效期7天（604800秒）


          二维码图片的样式如下图：

          ![image](https://qcloudimg.tencent-cloud.cn/raw/7ec2478761158a35a9c623882839a5df.png)'
        disabled: false
        example: C61r2kWfiCz0jXdD1S60a4vI9Rt9O1nSr6a2S21Gzlm/V/8A4MY/+........（图片base64编码）
        nullable: false
        type: string
        x-tcapi-reference: []
        x-tcapi-visibility: 1
    type: object
    x-tcapi-output-required:
    - QrcodeBase64
  CreateOrganizationGroupInvitationLinkRequest:
    properties:
      ExpireTime:
        description: 到期时间（以秒为单位的时间戳），其上限为30天的有效期限。
        disabled: false
        example: '1736494983'
        format: int64
        type: integer
        x-tcapi-reference: []
        x-tcapi-visibility: 1
      Operator:
        $ref: '#/definitions/UserInfo'
        description: '执行本接口操作的员工信息。使用此接口时，必须填写userId。 支持填入集团子公司经办人 userId 代发合同。  注:
          `在调用此接口时，请确保指定的员工已获得所需的接口调用权限，并具备接口传入的相应资源的数据权限。`'
        disabled: false
        example: 无
        x-tcapi-reference: []
        x-tcapi-visibility: 1
    required:
    - Operator
    - ExpireTime
    type: object
  CreateOrganizationGroupInvitationLinkResponse:
    properties:
      ExpireTime:
        description: 到期时间（以秒为单位的时间戳）
        disabled: false
        example: '1736495023'
        format: int64
        nullable: false
        type: integer
        x-tcapi-reference: []
        x-tcapi-visibility: 1
      JumpUrl:
        description: '加入集团短链接。

          注意:

          1. 该链接有效期时间为ExpireTime，同时需要注意保密，不要外泄给无关用户。

          2. 该链接不支持小程序嵌入，仅支持<b>移动端浏览器</b>打开。

          3. <font color="red">生成的链路后面不能再增加参数</font>（会出现覆盖链接中已有参数导致错误）'
        disabled: false
        example: https://essurl.cn/Rg0**Q
        nullable: false
        type: string
        x-tcapi-reference: []
        x-tcapi-visibility: 1
      Link:
        description: '加入集团二维码链接，子企业的管理员可以直接扫码进入。

          注意:1. 该链接有效期时间为ExpireTime，同时需要注意保密，不要外泄给无关用户。2. 该链接不支持小程序嵌入，仅支持<b>移动端浏览器</b>打开。3.
          <font color="red">生成的链路后面不能再增加参数</font>（会出现覆盖链接中已有参数导致错误）'
        disabled: false
        example: https://essurl.cn/Y9b**O
        nullable: false
        type: string
        x-tcapi-reference: []
        x-tcapi-visibility: 1
      MiniAppPath:
        description: '腾讯电子签小程序加入集团链接。


          <li>小程序和APP集成使用</li>

