          生成的链接是 短链的方式，所以参数中 Endpoint 为 HTTP_SHORT_URL'
        input: "POST / HTTP/1.1\nHost: ess.tencentcloudapi.com\nContent-Type: application/json\n\
          X-TC-Action: CreateUserMobileChangeUrl\n<公共请求参数>\n\n{\n    \"Operator\"\
