name: Build and Release

# 触发条件：推送 tag 时触发（如 v1.0.0）
on:
  push:
    tags:
      - 'v*'

  # 也支持手动触发
  workflow_dispatch:
    inputs:
      tag_name:
        description: '版本号（如 v1.0.0）'
        required: false
        default: 'manual-build'

permissions:
  contents: write

jobs:
  build:
    name: Build for ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          # Linux
          - goos: linux
            goarch: amd64
            suffix: ''
            archive: tar.gz
          - goos: linux
            goarch: arm64
            suffix: ''
            archive: tar.gz
          # macOS
          - goos: darwin
            goarch: amd64
            suffix: ''
            archive: tar.gz
          - goos: darwin
            goarch: arm64
            suffix: ''
            archive: tar.gz
          # Windows
          - goos: windows
            goarch: amd64
            suffix: '.exe'
            archive: zip
          - goos: windows
            goarch: arm64
            suffix: '.exe'
            archive: zip

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Go 环境
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: 获取版本号
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.tag_name }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: 编译
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          BINARY_NAME="ess_mcp_server${{ matrix.suffix }}"
          go build -ldflags="-s -w -X main.Version=${{ steps.version.outputs.version }}" -o ${BINARY_NAME} .
          echo "BINARY_NAME=${BINARY_NAME}" >> $GITHUB_ENV

      - name: 打包产物
        run: |
          VERSION=${{ steps.version.outputs.version }}
          PACKAGE_NAME="ess_mcp_server-${VERSION}-${{ matrix.goos }}-${{ matrix.goarch }}"
          mkdir -p ${PACKAGE_NAME}

          # 复制可执行文件
          cp ${{ env.BINARY_NAME }} ${PACKAGE_NAME}/

          # 复制 yaml 目录（运行时需要）
          cp -r yaml/ ${PACKAGE_NAME}/yaml/

          # 复制配置文件
          cp config.yaml ${PACKAGE_NAME}/

          # 复制 README
          if [ -f readme.md ]; then
            cp readme.md ${PACKAGE_NAME}/
          fi

          # 根据平台选择打包格式
          if [ "${{ matrix.archive }}" = "zip" ]; then
            zip -r ${PACKAGE_NAME}.zip ${PACKAGE_NAME}/
            echo "ARCHIVE_FILE=${PACKAGE_NAME}.zip" >> $GITHUB_ENV
          else
            tar -czf ${PACKAGE_NAME}.tar.gz ${PACKAGE_NAME}/
            echo "ARCHIVE_FILE=${PACKAGE_NAME}.tar.gz" >> $GITHUB_ENV
          fi

          echo "PACKAGE_NAME=${PACKAGE_NAME}" >> $GITHUB_ENV

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PACKAGE_NAME }}
          path: ${{ env.ARCHIVE_FILE }}

  release:
    name: 创建 Release
    needs: build
    runs-on: ubuntu-latest
    # 仅在 tag 推送时创建 Release
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: 获取版本号
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: 下载所有构建产物
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: 整理产物
        run: |
          mkdir -p release-assets
          find artifacts/ -type f \( -name "*.tar.gz" -o -name "*.zip" \) -exec cp {} release-assets/ \;
          ls -la release-assets/

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Release ${{ steps.version.outputs.version }}
          body: |
            ## ESS MCP Server ${{ steps.version.outputs.version }}

            ### 下载说明
            请根据您的操作系统和 CPU 架构选择对应的安装包：

            | 操作系统 | 架构 | 文件 |
            |---------|------|------|
            | Linux | x86_64 (amd64) | `ess_mcp_server-*-linux-amd64.tar.gz` |
            | Linux | ARM64 | `ess_mcp_server-*-linux-arm64.tar.gz` |
            | macOS | Intel (amd64) | `ess_mcp_server-*-darwin-amd64.tar.gz` |
            | macOS | Apple Silicon (arm64) | `ess_mcp_server-*-darwin-arm64.tar.gz` |
            | Windows | x86_64 (amd64) | `ess_mcp_server-*-windows-amd64.zip` |
            | Windows | ARM64 | `ess_mcp_server-*-windows-arm64.zip` |

            ### 使用方式
            1. 下载并解压对应平台的压缩包
            2. 修改 `config.yaml` 配置文件
            3. 运行可执行文件 `ess_mcp_server`
          draft: false
          prerelease: false
          files: release-assets/*
